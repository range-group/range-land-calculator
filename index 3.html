  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #f8f8f8; color: #111; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; font-family: 'Inter', sans-serif; }
    input { font-family: 'JetBrains Mono', 'Courier New', monospace; color: #111; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    /* ── TOKENS ── */
    :root {
      --bg: #f8f8f8;
      --surface: #ffffff;
      --surface-2: #f4f4f5;
      --border: #e4e4e7;
      --border-strong: #d4d4d8;
      --text: #111111;
      --text-2: #52525b;
      --text-3: #a1a1aa;
      --accent: #1a56db;       /* electric blue — trust, precision */
      --accent-light: #eff4ff;
      --accent-border: #bfcffa;
      --green: #16a34a;
      --amber: #b45309;
      --red: #dc2626;
      --mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    /* ── LAYOUT ── */
    .app { min-height: 100vh; padding: 3rem 1.5rem 6rem; background: var(--bg); }
    .inner { max-width: 880px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    /* ── HEADER ── */
    .hdr { margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .hdr-left {}
    .hdr-logo { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; color: var(--text); }
    .hdr-logo span { color: var(--accent); }
    .hdr-sub { font-size: 0.75rem; color: var(--text-3); margin-top: 0.2rem; letter-spacing: 0.01em; }
    .hdr-badge { font-size: 0.7rem; font-family: var(--mono); background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); border-radius: 5px; padding: 0.3rem 0.7rem; font-weight: 500; }

    /* ── SECTIONS ── */
    .section { margin-bottom: 1.8rem; }
    .sec-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.85rem; display: flex; align-items: center; gap: 0.6rem; }
    .sec-label::after { content:''; flex:1; height:1px; background: var(--border); }
    .sub-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-3); margin: 0.9rem 0 0.5rem; }

    /* ── MODEL BUTTONS ── */
    .model-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 0.9rem; color: var(--text-2); font-size: 0.85rem; font-weight: 400; margin-bottom: 0.4rem; transition: all 0.12s; text-align: left; }
    .model-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .model-btn.active { background: var(--accent-light); border-color: var(--accent); border-width: 1.5px; color: var(--text); }
    .model-price { font-family: var(--mono); font-size: 0.8rem; color: var(--text-3); }
    .model-btn.active .model-price { color: var(--accent); font-weight: 500; }

    /* ── TOGGLE BUTTONS ── */
    .tg { display: grid; gap: 0.35rem; }
    .tg-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 0.5rem 0.3rem; color: var(--text-3); font-size: 0.8rem; font-weight: 400; transition: all 0.12s; }
    .tg-btn:hover { border-color: var(--border-strong); color: var(--text-2); }
    .tg-btn.active { background: var(--accent-light); border-color: var(--accent); border-width: 1.5px; color: var(--accent); font-weight: 600; }

    /* ── INPUTS ── */
    .field { margin-bottom: 0.9rem; }
    .field-lbl { font-size: 0.7rem; font-weight: 500; color: var(--text-2); margin-bottom: 0.35rem; letter-spacing: 0.01em; }
    .field-row { position: relative; }
    .field-pre { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-3); font-family: var(--mono); font-size: 0.85rem; pointer-events: none; }
    .field-inp { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.75rem 0.65rem 1.7rem; color: var(--text); font-family: var(--mono); font-size: 0.88rem; outline: none; transition: border-color 0.15s, box-shadow 0.15s; -webkit-appearance: none; }
    .field-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }

    /* ── SETUP LINES ── */
    .sl { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.38rem; }
    .sl-lbl { flex: 1; font-size: 0.8rem; color: var(--text-3); }
    .sl-lbl-inp { flex: 1; background: transparent; border: 1px solid transparent; border-radius: 4px; padding: 0.25rem 0.4rem; color: var(--text-3); font-size: 0.78rem; outline: none; font-family: 'Inter', sans-serif; }
    .sl-lbl-inp:focus { border-color: var(--border); background: var(--surface); }
    .sl-wrap { position: relative; width: 90px; flex-shrink: 0; }
    .sl-pre { position: absolute; left: 0.5rem; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 0.72rem; pointer-events: none; font-family: var(--mono); }
    .sl-inp { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.32rem 0.4rem 0.32rem 1.1rem; color: var(--text); font-family: var(--mono); font-size: 0.78rem; outline: none; -webkit-appearance: none; }
    .sl-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(26,86,219,0.1); }
    .sl-total { display: flex; justify-content: space-between; padding-top: 0.65rem; margin-top: 0.4rem; border-top: 1px solid var(--border); }
    .sl-total-lbl { font-size: 0.83rem; font-weight: 600; color: var(--text); }
    .sl-total-val { font-family: var(--mono); font-size: 0.88rem; font-weight: 600; color: var(--text); }

    /* ── INDICATOR ── */
    .indicator { display: flex; align-items: center; gap: 0.9rem; padding: 1rem 1.1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; }
    .ind-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .ind-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
    .ind-sub { font-size: 0.68rem; color: var(--text-3); margin-top: 0.15rem; }

    /* ── PROFIT CARD ── */
    .profit-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem 1.2rem 1.4rem; margin-bottom: 1.5rem; text-align: center; }
    .profit-lbl { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.6rem; }
    .profit-val { font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 300; letter-spacing: -0.04em; line-height: 1; font-family: 'Inter', sans-serif; }
    .profit-meta { display: flex; justify-content: center; gap: 0; margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .meta-item { flex: 1; text-align: center; border-right: 1px solid var(--border); }
    .meta-item:last-child { border-right: none; }
    .meta-lbl { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }
    .meta-val { font-size: 1rem; font-family: var(--mono); color: var(--text); margin-top: 0.25rem; font-weight: 500; }

    /* ── COST STACK ── */
    .cs-row { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; }
    .cs-lbl { font-size: 0.8rem; color: var(--text-2); }
    .cs-val { font-family: var(--mono); font-size: 0.8rem; color: var(--text-2); }
    .cs-row.in { padding-left: 0.9rem; }
    .cs-row.in .cs-lbl { font-size: 0.76rem; color: var(--text-3); }
    .cs-row.in .cs-val { font-size: 0.76rem; color: var(--text-3); }
    .cs-row.b .cs-lbl { font-weight: 600; color: var(--text); font-size: 0.84rem; }
    .cs-row.b .cs-val { font-weight: 600; color: var(--text); font-size: 0.84rem; }
    .cs-row.neg .cs-val { color: var(--red); }
    .cs-div { height: 1px; background: var(--border); margin: 0.5rem 0; }
    .cs-cat { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin: 0.7rem 0 0.25rem; }
    .cs-net { display: flex; justify-content: space-between; padding: 0.6rem 0; margin-top: 0.25rem; border-top: 2px solid var(--text); }
    .cs-net-lbl { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .cs-net-val { font-family: var(--mono); font-size: 0.9rem; font-weight: 700; }

    /* ── SENSITIVITY ── */
    .sens-row { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.55rem; }
    .sens-lbl { font-family: var(--mono); font-size: 0.66rem; width: 3.2rem; flex-shrink: 0; color: var(--text-3); }
    .sens-lbl.a { color: var(--accent); font-weight: 600; }
    .sens-track { flex: 1; height: 4px; background: var(--surface-2); border-radius: 3px; }
    .sens-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .sens-val { font-family: var(--mono); font-size: 0.72rem; width: 5.5rem; text-align: right; flex-shrink: 0; color: var(--text-3); }
    .sens-val.a { font-weight: 600; }

    /* ── INLINE ROW ── */
    .inline-row { display: flex; justify-content: space-between; align-items: center; padding: 0.32rem 0; border-bottom: 1px solid var(--border); }
    .inline-row:last-child { border-bottom: none; }
    .inline-lbl { font-size: 0.78rem; color: var(--text-3); }
    .inline-val { font-family: var(--mono); font-size: 0.78rem; color: var(--text-2); }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const DEFAULT_MODELS=[
  {name:"TRU Redwood",            cost:73000, sqft:2001, claytonTrim:false},
  {name:"TRU Sycamore",           cost:68000, sqft:1790, claytonTrim:false},
  {name:"TRU Oak",                cost:57000, sqft:1475, claytonTrim:false},
  {name:"Clayton Haven",          cost:71000, sqft:1580, claytonTrim:true},
  {name:"Clayton Solace",         cost:79000, sqft:1790, claytonTrim:true},
  {name:"Clayton Choice",         cost:88000, sqft:1896, claytonTrim:true},
  {name:"Clayton Absolute Value", cost:93000, sqft:2001, claytonTrim:true},
  {name:"Custom / Other",         cost:0,     sqft:0,    claytonTrim:false},
];
const DEFAULTS={
  homeIdx:1,customHome:73000,customHomeName:"Custom Model",
  modelCosts:[73000,68000,57000,71000,79000,88000,93000,0],
  dealName:"",dealAddress:"",notes:"",
  lotCost:70000,salePrice:260000,loanMonths:5,commPct:0.06,sellerCredit:0,
  financed:true, ltcPct:90,ltvCapPct:70,surveyAmount:650,
  interestRate:12,originationPts:2.5,
  setup:{housePad:2000,driveway:1200,culvert:700,grading:1200,septic:8500,plumbing:400,waterLine:700,electric:2200,electricPost:2000,setLevel:7250,trimUpgrade:3300,fhaRetrofit:3000,skirting:3000,decks:3000,hvac:4000,demo:0,custom1:0,custom2:0,contingency:2500},
  c1lbl:"Custom Item 1",c2lbl:"Custom Item 2",
  taxRate:1.85,
  holding:{insurance:1200,maintenance:500,hoa:0,utilities:500,custom:0},hcLbl:"Other"
};
// Load saved state or use defaults
function loadState(){
  try{const s=localStorage.getItem("rlg_calc_v1");return s?{...JSON.parse(JSON.stringify(DEFAULTS)),...JSON.parse(s)}:JSON.parse(JSON.stringify(DEFAULTS));}
  catch{return JSON.parse(JSON.stringify(DEFAULTS));}
}
function saveState(){
  try{localStorage.setItem("rlg_calc_v1",JSON.stringify(S));}catch{}
}
function resetState(){
  Object.assign(S,JSON.parse(JSON.stringify(DEFAULTS)));
  S.mode=S.mode||"full"; S.savedDeals=S.savedDeals||[];
  saveState();render();
}
const S=loadState();
if(!S.mode)S.mode="full";
if(!S.savedDeals)S.savedDeals=[];
if(!S.notes)S.notes="";
if(!S.quickAcres)S.quickAcres=1;
if(!S.quickArvOverride)S.quickArvOverride=false;
const BUY_TITLE=0.005,SELL_TITLE=0.01,MINP=35000;
const fmt=n=>n<0?`-$${Math.abs(Math.round(n)).toLocaleString()}`:`$${Math.round(n).toLocaleString()}`;
const fmtP=n=>`${(n*100).toFixed(1)}%`;
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

function recalc(){
  const hc = S.homeIdx===DEFAULT_MODELS.length-1 ? S.customHome : S.modelCosts[S.homeIdx];
  const modelName = S.homeIdx===DEFAULT_MODELS.length-1 ? S.customHomeName : DEFAULT_MODELS[S.homeIdx].name;
  const isClayton = DEFAULT_MODELS[S.homeIdx]?.claytonTrim === true;

  // Auto-adjust interior trim based on model type
  const effectiveTrim = isClayton ? 1600 : S.setup.trimUpgrade;

  // Hard cost = lot + home + all setup items (swap trimUpgrade with effectiveTrim)
  const st = Object.values(S.setup).reduce((a,b)=>a+b, 0) - S.setup.trimUpgrade + effectiveTrim;
  const hard = S.lotCost + hc + st;

  // Holding costs — property tax pro-rated to hold period
  const propTax = Math.round(hard * (S.taxRate/100) * (S.loanMonths/12));
  const ht = propTax + Object.values(S.holding).reduce((a,b)=>a+b, 0);

  // Buy-side closing costs: 0.5% of lot + survey
  const buyTitle = Math.round(S.lotCost * BUY_TITLE);
  const buyClosing = buyTitle + S.surveyAmount;

  // Financing — zeroed when cash deal
  let loanAmt=0, loanByLTC=0, loanByLTV=0, ltc=0, ltv=0;
  let orig=0, intr=0, tfin=0;
  let downPayment=hard, cashToClose=hard+buyClosing;

  if(S.financed){
    loanByLTC = Math.round(hard * (S.ltcPct/100));
    loanByLTV = Math.round(S.salePrice * (S.ltvCapPct/100));
    loanAmt   = Math.min(loanByLTC, loanByLTV);
    ltc       = loanAmt / hard;
    ltv       = loanAmt / S.salePrice;
    orig      = loanAmt * (S.originationPts/100);
    intr      = (loanAmt * (S.interestRate/100) / 12) * S.loanMonths;
    tfin      = orig + intr;
    downPayment  = hard - loanAmt;
    cashToClose  = downPayment + orig + buyClosing;
  }

  // Sell-side costs: commission + 1% title
  const comm     = S.salePrice * S.commPct;
  const sellTitle = Math.round(S.salePrice * SELL_TITLE);
  const tsell    = comm + sellTitle + S.sellerCredit;

  // Totals
  const total  = hard + tfin + ht + tsell;
  const net    = S.salePrice - total;

  // Returns
  const roi    = hard > 0 ? net / hard : 0;
  const margin = S.salePrice > 0 ? net / S.salePrice : 0;
  const coc    = cashToClose > 0 ? net / cashToClose : null;

  // Break-even: sp*(1 - commPct - SELL_TITLE) = hard + tfin + ht + sellerCredit
  const breakEven = Math.ceil((hard + tfin + ht + S.sellerCredit) / (1 - S.commPct - SELL_TITLE));

  return{hc,modelName,st,ht,hard,loanAmt,loanByLTC,loanByLTV,ltc,ltv,
    orig,intr,tfin,comm,sellTitle,tsell,total,net,downPayment,cashToClose,
    buyTitle,buyClosing,roi,margin,propTax,breakEven,coc,effectiveTrim,isClayton};
}

        const sp=S.salePrice+d;
        const net=sp-c.hard-c.tfin-c.ht-(sp*S.commPct+sp*SELL_TITLE+S.sellerCredit);
        const base=(S.salePrice+20000)-c.hard-c.tfin-c.ht-((S.salePrice+20000)*S.commPct+(S.salePrice+20000)*SELL_TITLE+S.sellerCredit);
        const w=Math.max(3,Math.min(100,base>0?(net/base)*100:4));

          <div class="sens-track"><div class="sens-fill" style="width:${w}%;background:${a?fc:"#d4d4d8"}"></div></div>

    <div class="section">

        // Calculate net for each non-custom model using current deal variables
        const results = DEFAULT_MODELS.filter(m=>m.cost>0).map((m,origIdx)=>{
          const idx = DEFAULT_MODELS.indexOf(m);
          const hcM = S.modelCosts[idx];
          const trimM = m.claytonTrim ? 1600 : S.setup.trimUpgrade;
          const stM = Object.values(S.setup).reduce((a,b)=>a+b,0) - S.setup.trimUpgrade + trimM;
          const hardM = S.lotCost + hcM + stM;
          const propTaxM = Math.round(hardM*(S.taxRate/100)*(S.loanMonths/12));
          const htM = propTaxM + Object.values(S.holding).reduce((a,b)=>a+b,0);
          let tfinM = 0;
          if(S.financed){
            const loanM = Math.min(Math.round(hardM*(S.ltcPct/100)), Math.round(S.salePrice*(S.ltvCapPct/100)));
            const origM = loanM*(S.originationPts/100);
            const intrM = (loanM*(S.interestRate/100)/12)*S.loanMonths;

          }
          const tsellM = S.salePrice*S.commPct + Math.round(S.salePrice*SELL_TITLE) + S.sellerCredit;
          const netM = S.salePrice - hardM - tfinM - htM - tsellM;
          return {name:m.name, cost:hcM, net:netM, isCurrent:idx===S.homeIdx};
        }).sort((a,b)=>b.net-a.net);

        const maxNet = Math.max(...results.map(r=>r.net));

        const range = maxNet - minNet || 1;

        return results.map((r,i)=>{

function buildQuickMode(c,pc,dc,dg,il){
  // ARV anchor points by acreage — interpolated
  const ARV_ANCHORS=[{ac:1,arv:255000},{ac:2,arv:270000},{ac:3,arv:310000},{ac:4,arv:375000},{ac:5,arv:400000}];
  function autoARV(acres){
    if(acres<=ARV_ANCHORS[0].ac) return ARV_ANCHORS[0].arv;
    if(acres>=ARV_ANCHORS[ARV_ANCHORS.length-1].ac) return ARV_ANCHORS[ARV_ANCHORS.length-1].arv;
    for(let i=0;i<ARV_ANCHORS.length-1;i++){
      const a=ARV_ANCHORS[i],b=ARV_ANCHORS[i+1];
      if(acres>=a.ac&&acres<=b.ac){
        const t=(acres-a.ac)/(b.ac-a.ac);
        return Math.round((a.arv+t*(b.arv-a.arv))/5000)*5000;
      }
    }
    return 275000;
  }

  // If ARV hasn't been manually set, auto-fill from acreage
  const arvIsAuto = !S.quickArvOverride;
  const displayARV = arvIsAuto ? autoARV(S.quickAcres) : S.salePrice;
  if(arvIsAuto && displayARV !== S.salePrice){ S.salePrice=displayARV; }

  // Auto-select model based on acres
  const autoIdx = S.quickAcres <= 2 ? 1 : 0;
  const qIdx = (S.quickHomeIdx !== undefined) ? S.quickHomeIdx : autoIdx;
  const qModel = DEFAULT_MODELS[qIdx];
  const qHomeCost = S.modelCosts[qIdx];
  const qTrim = qModel.claytonTrim ? 1600 : S.setup.trimUpgrade;
  const qSt = Object.values(S.setup).reduce((a,b)=>a+b,0) - S.setup.trimUpgrade + qTrim;

  // Back-calculate max lot offer (5-pass convergence)
  let lotEst = S.salePrice * 0.2;
  for(let i=0;i<5;i++){
    const hardEst = lotEst + qHomeCost + qSt;
    const propTaxEst = hardEst*(S.taxRate/100)*(S.loanMonths/12);
    const htEst = propTaxEst + Object.values(S.holding).reduce((a,b)=>a+b,0);
    let tfinEst=0;
    if(S.financed){
      const loanEst=Math.min(hardEst*(S.ltcPct/100), S.salePrice*(S.ltvCapPct/100));
      tfinEst=loanEst*(S.originationPts/100)+(loanEst*(S.interestRate/100)/12)*S.loanMonths;
    }
    const tsellEst=S.salePrice*S.commPct+Math.round(S.salePrice*SELL_TITLE)+S.sellerCredit;
    lotEst = S.salePrice - qHomeCost - qSt - tfinEst - htEst - tsellEst - S.quickTargetProfit;
  }
  const maxOffer = Math.floor(lotEst/1000)*1000;
  const good=maxOffer>0, warn=maxOffer>-20000&&maxOffer<=0;
  const oc=good?"#16a34a":warn?"#b45309":"#dc2626";

  // Stepper helper — renders +/- buttons around a value
  const stepper=(val,step,onDec,onInc,display)=>`
    <div style="display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface)">
      <button onclick="${onDec}" style="width:52px;height:52px;font-size:1.3rem;font-weight:300;background:transparent;border:none;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent">−</button>
      <div style="flex:1;text-align:center;font-family:var(--mono);font-size:1.1rem;font-weight:500;color:var(--text);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0.9rem 0.5rem">${display}</div>
      <button onclick="${onInc}" style="width:52px;height:52px;font-size:1.3rem;font-weight:300;background:transparent;border:none;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent">+</button>
    </div>`;

  return`
  <div style="max-width:480px;margin:0 auto;padding-top:0.5rem">

    <!-- Lot size -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Lot Size</span>
        <span style="font-family:var(--mono);font-size:1.6rem;font-weight:300;color:var(--text);line-height:1">${S.quickAcres}<span style="font-size:0.9rem;color:var(--text-3);margin-left:0.3rem">ac</span></span>
      </div>
      <input type="range" min="1" max="20" step="0.5" value="${S.quickAcres}"
        style="width:100%;accent-color:var(--accent);height:6px;border-radius:3px;cursor:pointer"
        oninput="S.quickAcres=parseFloat(this.value);S.quickHomeIdx=undefined;S.quickArvOverride=false;saveState();render()" />
      <div style="display:flex;justify-content:space-between;margin-top:0.5rem;font-size:0.62rem;color:var(--text-3)">
        <span>1</span><span>5</span><span>10</span><span>15</span><span>20 ac</span>
      </div>
    </div>

    <!-- ARV -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.9rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Sale Price / ARV</span>
        ${arvIsAuto?`<span style="font-size:0.6rem;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);border-radius:4px;padding:0.15rem 0.5rem;font-weight:600;font-family:var(--mono)">AUTO</span>`
        :`<button onclick="S.quickArvOverride=false;saveState();render()" style="font-size:0.6rem;color:var(--text-3);background:none;border:1px solid var(--border);border-radius:4px;padding:0.15rem 0.5rem;font-family:'Inter',sans-serif">Reset to auto</button>`}
      </div>
      ${stepper(
        S.salePrice, 5000,
        `S.salePrice=Math.max(50000,S.salePrice-5000);S.quickArvOverride=true;saveState();render()`,
        `S.salePrice=S.salePrice+5000;S.quickArvOverride=true;saveState();render()`,
        fmt(S.salePrice)
      )}
      ${arvIsAuto?`<div style="font-size:0.62rem;color:var(--text-3);margin-top:0.6rem;text-align:center">Auto-estimated for ${S.quickAcres} ac · tap +/− to override</div>`:""}
    </div>

    <!-- Target profit -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Target Profit</span>
        <span style="font-family:var(--mono);font-size:1.6rem;font-weight:300;color:${S.quickTargetProfit>=MINP?"var(--text)":"#dc2626"};line-height:1">${fmt(S.quickTargetProfit)}</span>
      </div>
      <input type="range" min="20000" max="120000" step="5000" value="${S.quickTargetProfit}"
        style="width:100%;accent-color:var(--accent);height:6px;border-radius:3px;cursor:pointer"
        oninput="S.quickTargetProfit=parseInt(this.value);saveState();render()" />
      <div style="display:flex;justify-content:space-between;margin-top:0.5rem;font-size:0.62rem;color:var(--text-3)">
        <span>$20K</span><span>$45K floor</span><span>$70K</span><span>$95K</span><span>$120K</span>
      </div>
      ${S.quickTargetProfit<MINP?`<div style="font-size:0.65rem;color:#dc2626;margin-top:0.6rem;font-weight:500;text-align:center">⚠ Below $35K minimum threshold</div>`:""}
    </div>

    <!-- Home model selector -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.85rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Home Model</span>
        <span style="font-size:0.62rem;color:var(--text-3)">${S.quickAcres<=2?"≤2 ac default":"3+ ac default"}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
        ${DEFAULT_MODELS.filter(m=>m.cost>0).map(m=>{
          const i=DEFAULT_MODELS.indexOf(m);
          const isActive=i===qIdx;
          return`<button onclick="S.quickHomeIdx=${i};saveState();render()"
            style="padding:0.75rem 0.6rem;min-height:52px;border-radius:9px;border:1.5px solid ${isActive?"var(--accent)":"var(--border)"};background:${isActive?"var(--accent-light)":"var(--surface)"};text-align:left;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent">
            <div style="font-size:0.72rem;font-weight:${isActive?"600":"400"};color:${isActive?"var(--accent)":"var(--text-2)"}">${m.name}</div>

          </button>`;
        }).join("")}
      </div>
    </div>

    <!-- Max offer result -->
    <div style="background:${good?"#f0fdf4":warn?"#fffbeb":"#fef2f2"};border:2px solid ${oc};border-radius:14px;padding:1.8rem 1.4rem 1.6rem;margin-bottom:1rem;text-align:center">

      <div style="font-size:0.73rem;color:${oc};margin-top:0.6rem;opacity:0.85">${good?"✓ Achieves "+fmt(S.quickTargetProfit)+" profit target":warn?"Tight — reduce target or increase ARV":"Deal doesn't pencil at this ARV"}</div>
      <div style="margin-top:1.2rem;padding-top:1rem;border-top:1px solid ${oc}25;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem">
        <div><div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.06em;color:${oc};opacity:0.65;margin-bottom:0.2rem">Home Cost</div><div style="font-family:var(--mono);font-size:0.8rem;font-weight:500;color:${oc}">${fmt(qHomeCost)}</div></div>
        <div><div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.06em;color:${oc};opacity:0.65;margin-bottom:0.2rem">Model</div><div style="font-size:0.7rem;font-weight:600;color:${oc}">${qModel.name.replace("Clayton ","").replace("TRU ","")}</div></div>
        <div><div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.06em;color:${oc};opacity:0.65;margin-bottom:0.2rem">ARV</div><div style="font-family:var(--mono);font-size:0.8rem;font-weight:500;color:${oc}">${fmt(S.salePrice)}</div></div>

    <div style="text-align:center;margin-bottom:2.5rem">
      <button onclick="S.mode='full';saveState();render()" style="font-size:0.78rem;color:var(--accent);background:none;border:none;font-family:'Inter',sans-serif;padding:0.5rem 1rem;min-height:44px">Open full calculator →</button>

  `;
}

function nf(label,key){
  const val=eval(key);
  return`<div class="field"><div class="field-lbl">${label}</div>
    <div class="field-row"><span class="field-pre">$</span>
      <input class="field-inp" type="tel" inputmode="numeric" value="${val}"
        onblur="${key}=parseInt(this.value.replace(/[^0-9]/g,''))||0;saveState();render()"
        onkeydown="if(event.key==='Enter')this.blur()" />
    </div></div>`;
}
function sl(key,lbl){
  return`<div class="sl"><span class="sl-lbl">${lbl}</span>
    <div class="sl-wrap"><span class="sl-pre">$</span>
      <input class="sl-inp" type="tel" inputmode="numeric" value="${S.setup[key]}"
        onblur="S.setup['${key}']=parseInt(this.value.replace(/[^0-9]/g,''))||0;saveState();render()"
        onkeydown="if(event.key==='Enter')this.blur()" />
    </div></div>`;
}
function hl(key,lbl){
  return`<div class="sl"><span class="sl-lbl">${lbl}</span>
    <div class="sl-wrap"><span class="sl-pre">$</span>
      <input class="sl-inp" type="tel" inputmode="numeric" value="${S.holding[key]}"
        onblur="S.holding['${key}']=parseInt(this.value.replace(/[^0-9]/g,''))||0;saveState();render()"
        onkeydown="if(event.key==='Enter')this.blur()" />
    </div></div>`;
}
function cr(label,value,indent,bold){
  const neg=String(value).startsWith("-");
  return`<div class="cs-row${indent?" in":""}${bold?" b":""}${neg?" neg":""}">
    <span class="cs-lbl">${label}</span><span class="cs-val">${value}</span>
  </div>`;
}

function saveDeal(){
  const snap=JSON.parse(JSON.stringify(S));
  const name=S.dealName||(S.dealAddress?S.dealAddress.split(',')[0]:('Deal '+(S.savedDeals.length+1)));
  snap.name=name;
  if(!S.savedDeals)S.savedDeals=[];
  S.savedDeals.push(snap);
  saveState();render();
}
function loadDeal(idx){
  const snap=S.savedDeals[parseInt(idx)];
  if(!snap)return;
  const saved=S.savedDeals;
  Object.assign(S,snap);
  S.savedDeals=saved;
  saveState();render();
}

render();
