<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Range Land Group — Deal Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; }
    input { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const fmt = (n) => n < 0 ? `-$${Math.abs(Math.round(n)).toLocaleString()}` : `$${Math.round(n).toLocaleString()}`;
    const fmtPct = (n) => `${(n * 100).toFixed(1)}%`;

    const HOME_MODELS = [
      { name: "TRU Redwood", cost: 73000 },
      { name: "TRU Sycamore", cost: 68000 },
      { name: "TRU Oak", cost: 57000 },
      { name: "Custom / Other", cost: 0 },
    ];

    function SetupLine({ label, value, onChange, editable, onLabelChange, gold, border, textMuted, textPrimary, mono, serif, goldBorder }) {
      const [localVal, setLocalVal] = React.useState(String(value));
      const [focused, setFocused] = React.useState(false);
      const displayVal = focused ? localVal : String(value);
      return (
        <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.35rem" }}>
          {editable ? (
            <input type="text" defaultValue={label} onBlur={(e) => onLabelChange(e.target.value)}
              style={{ flex: 1, background: "transparent", border: `1px solid ${border}`, borderRadius: "4px", padding: "0.3rem 0.5rem", color: textMuted, fontFamily: serif, fontSize: "0.75rem", outline: "none", fontStyle: "italic" }} />
          ) : (
            <span style={{ flex: 1, fontSize: "0.76rem", color: textMuted, fontFamily: serif, fontStyle: "italic" }} dangerouslySetInnerHTML={{ __html: label }} />
          )}
          <div style={{ position: "relative", width: "90px", flexShrink: 0 }}>
            <span style={{ position: "absolute", left: "0.45rem", top: "50%", transform: "translateY(-50%)", color: gold, fontFamily: mono, fontSize: "0.7rem", opacity: 0.6 }}>$</span>
            <input type="tel" inputMode="numeric" value={displayVal}
              onFocus={() => { setLocalVal(String(value)); setFocused(true); }}
              onChange={(e) => setLocalVal(e.target.value.replace(/[^0-9]/g, ""))}
              onBlur={() => { setFocused(false); const n = parseInt(localVal, 10); onChange(isNaN(n) ? 0 : n); }}
              style={{ width: "100%", background: "transparent", border: `1px solid ${goldBorder}`, borderRadius: "4px", padding: "0.28rem 0.4rem 0.28rem 1.2rem", color: textPrimary, fontFamily: mono, fontSize: "0.76rem", outline: "none", boxSizing: "border-box" }} />
          </div>
        </div>
      );
    }

    function App() {
      const [homeModelIdx, setHomeModelIdx] = useState(1);
      const [customHomeCost, setCustomHomeCost] = useState(73000);
      const [lotCost, setLotCost] = useState(70000);
      const [salePrice, setSalePrice] = useState(260000);
      const [loanMonths, setLoanMonths] = useState(5);
      const [commissionPct, setCommissionPct] = useState(0.06);
      const [sellerCredit, setSellerCredit] = useState(0);
      const [setup, setSetup] = useState({
        housePad: 2000, driveway: 1200, culvert: 700, grading: 1200,
        septic: 8500, plumbing: 400, waterLine: 700, electric: 2200, electricPost: 2000,
        setLevel: 7250, trimUpgrade: 3300, fhaRetrofit: 3000, skirting: 3000,
        decks: 3000, hvac: 4000, demo: 0, custom1: 0, custom2: 0, contingency: 2500,
      });
      const [custom1Label, setCustom1Label] = useState("Custom Item 1");
      const [custom2Label, setCustom2Label] = useState("Custom Item 2");

      const setLine = (key, val) => setSetup((s) => ({ ...s, [key]: val }));
      const setupTotal = Object.values(setup).reduce((a, b) => a + b, 0);

      const INTEREST_RATE = 0.12;
      const POINTS = 0.025;
      const CLOSING = 0.015;

      const homeCost = homeModelIdx === HOME_MODELS.length - 1 ? customHomeCost : HOME_MODELS[homeModelIdx].cost;
      const setupCost = setupTotal;
      const hardCost = lotCost + homeCost + setupCost;
      const contingency = setup.contingency;
      const totalHard = hardCost;
      const loanAmount = totalHard;
      const originationFee = loanAmount * POINTS;
      const monthlyInterest = (loanAmount * INTEREST_RATE) / 12;
      const totalInterest = monthlyInterest * loanMonths;
      const totalFinancing = originationFee + totalInterest;
      const commissionAmt = salePrice * commissionPct;
      const closingAmt = salePrice * CLOSING;
      const totalSelling = commissionAmt + closingAmt + sellerCredit;
      const totalCost = totalHard + totalFinancing + totalSelling;
      const netProfit = salePrice - totalCost;
      const roi = netProfit / totalHard;
      const margin = netProfit / salePrice;

      const gold = "#c9a84c";
      const goldDim = "rgba(201,168,76,0.18)";
      const goldBorder = "rgba(201,168,76,0.28)";
      const bg = "#000000";
      const border = "rgba(255,255,255,0.08)";
      const textPrimary = "#eae6d8";
      const textMuted = "#7a7668";
      const textSub = "#4e4c44";
      const mono = "'Courier New', monospace";
      const serif = "'Georgia', serif";

      const MIN_PROFIT = 35000;
      const isGood = netProfit >= MIN_PROFIT;
      const isWarn = netProfit >= 0 && netProfit < MIN_PROFIT;
      const dotColor = isGood ? "#4ade80" : isWarn ? "#facc15" : "#f87171";
      const dotGlow = isGood ? "0 0 10px rgba(74,222,128,0.8),0 0 22px rgba(74,222,128,0.4)" : isWarn ? "0 0 10px rgba(250,204,21,0.8),0 0 22px rgba(250,204,21,0.4)" : "0 0 10px rgba(248,113,113,0.8),0 0 22px rgba(248,113,113,0.4)";
      const indicatorLabel = isGood ? "GO — Deal Clears Minimum" : isWarn ? "CAUTION — Below $35K" : "NO GO — Deal Loses Money";
      const profitColor = isGood ? "#4ade80" : isWarn ? "#facc15" : "#f87171";

      const Row = ({ label, value, indent, bold }) => (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.32rem 0", marginLeft: indent ? "1rem" : 0 }}>
          <span style={{ fontSize: indent ? "0.75rem" : "0.8rem", color: indent ? textMuted : textPrimary, fontFamily: serif, fontStyle: indent ? "italic" : "normal" }}>{label}</span>
          <span style={{ fontFamily: mono, fontSize: bold ? "0.88rem" : "0.8rem", fontWeight: bold ? "600" : "400", color: (value && value.startsWith && value.startsWith("-")) ? "#f87171" : indent ? textMuted : textPrimary }}>{value}</span>
        </div>
      );

      const Divider = () => <div style={{ height: "1px", background: border, margin: "0.4rem 0" }} />;
      const Label = ({ children }) => <div style={{ fontSize: "0.6rem", letterSpacing: "0.18em", textTransform: "uppercase", color: gold, fontFamily: mono, marginBottom: "0.6rem", opacity: 0.8 }}>{children}</div>;
      const Section = ({ children, style }) => <div style={{ borderTop: `1px solid ${border}`, padding: "1rem 0", marginBottom: "0.2rem", ...style }}>{children}</div>;

      const NumberInput = ({ value, onChange }) => {
        const [localVal, setLocalVal] = React.useState(String(value));
        const [focused, setFocused] = React.useState(false);
        const displayVal = focused ? localVal : String(value);
        return (
          <div style={{ position: "relative" }}>
            <span style={{ position: "absolute", left: "0.7rem", top: "50%", transform: "translateY(-50%)", color: gold, fontFamily: mono, fontSize: "0.8rem", opacity: 0.7 }}>$</span>
            <input type="tel" inputMode="numeric" value={displayVal}
              onFocus={() => { setLocalVal(String(value)); setFocused(true); }}
              onChange={(e) => setLocalVal(e.target.value.replace(/[^0-9]/g, ""))}
              onBlur={() => { setFocused(false); const n = parseInt(localVal, 10); if (!isNaN(n)) onChange(n); else setLocalVal(String(value)); }}
              style={{ width: "100%", background: "transparent", border: `1px solid ${goldBorder}`, borderRadius: "5px", padding: "0.5rem 0.7rem 0.5rem 1.5rem", color: textPrimary, fontFamily: mono, fontSize: "0.85rem", outline: "none", boxSizing: "border-box" }} />
          </div>
        );
      };

      const Btn = ({ active, onClick, children }) => (
        <button onClick={onClick} style={{ background: active ? goldDim : "transparent", border: `1px solid ${active ? gold : border}`, borderRadius: "5px", padding: "0.5rem 0.4rem", color: active ? gold : textMuted, fontFamily: mono, fontSize: "0.82rem", cursor: "pointer", textAlign: "center" }}>
          {children}
        </button>
      );

      return (
        <div style={{ minHeight: "100vh", background: bg, color: textPrimary, fontFamily: serif, padding: "2rem 1rem" }}>
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: "2rem" }}>
            <div style={{ fontSize: "clamp(2rem, 6vw, 3rem)", fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif", fontWeight: "200", letterSpacing: "0.35em", color: "#ffffff", textTransform: "uppercase", lineHeight: 1 }}>Range</div>
            <div style={{ width: "60%", maxWidth: "260px", height: "1px", background: "rgba(255,255,255,0.2)", margin: "0.5rem auto" }} />
            <div style={{ fontSize: "clamp(0.6rem, 2vw, 0.8rem)", fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif", fontWeight: "300", letterSpacing: "0.55em", color: "#ffffff", textTransform: "uppercase" }}>Land Group</div>
            <div style={{ width: "36px", height: "1px", background: gold, margin: "1rem auto 0.5rem", opacity: 0.6 }} />
            <div style={{ fontSize: "0.58rem", letterSpacing: "0.25em", color: textSub, fontFamily: mono, textTransform: "uppercase" }}>Home + Land Calculator</div>
          </div>

          <div style={{ maxWidth: "820px", margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.5rem" }}>

            {/* LEFT */}
            <div>
              <Section>
                <Label>Home Model</Label>
                <div style={{ display: "grid", gap: "0.5rem" }}>
                  {HOME_MODELS.map((m, i) => (
                    <button key={i} onClick={() => setHomeModelIdx(i)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: homeModelIdx === i ? goldDim : "transparent", border: `1px solid ${homeModelIdx === i ? gold : border}`, borderRadius: "5px", padding: "0.45rem 0.75rem", color: homeModelIdx === i ? gold : textMuted, fontFamily: serif, fontSize: "0.8rem", cursor: "pointer", textAlign: "left" }}>
                      <span>{m.name}</span>
                      <span style={{ fontFamily: mono, fontSize: "0.75rem" }}>{m.cost > 0 ? fmt(m.cost) : "—"}</span>
                    </button>
                  ))}
                </div>
                {homeModelIdx === HOME_MODELS.length - 1 && (
                  <div style={{ marginTop: "0.7rem" }}>
                    <div style={{ fontSize: "0.65rem", color: textMuted, fontFamily: mono, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "0.35rem" }}>Custom Cost</div>
                    <NumberInput value={customHomeCost} onChange={setCustomHomeCost} />
                  </div>
                )}
              </Section>

              <Section>
                <Label>Deal Variables</Label>
                <div style={{ marginBottom: "0.9rem" }}>
                  <div style={{ fontSize: "0.65rem", color: textMuted, fontFamily: mono, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "0.35rem" }}>Lot Cost</div>
                  <NumberInput value={lotCost} onChange={setLotCost} />
                </div>
                <div style={{ marginBottom: "0.9rem" }}>
                  <div style={{ fontSize: "0.65rem", color: textMuted, fontFamily: mono, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "0.35rem" }}>Sale Price</div>
                  <NumberInput value={salePrice} onChange={setSalePrice} />
                </div>
                <div>
                  <div style={{ fontSize: "0.65rem", color: textMuted, fontFamily: mono, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "0.35rem" }}>Seller Credit to Buyer</div>
                  <NumberInput value={sellerCredit} onChange={setSellerCredit} />
                  {sellerCredit > 0 && <div style={{ fontSize: "0.62rem", color: textSub, fontFamily: serif, fontStyle: "italic", marginTop: "0.3rem" }}>{((sellerCredit / salePrice) * 100).toFixed(1)}% of sale price</div>}
                </div>
              </Section>

              <Section>
                <Label>Setup &amp; Utility Costs</Label>
                <div style={{ fontSize: "0.6rem", color: textSub, fontFamily: mono, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: "0.4rem" }}>Site Work</div>
                {[["housePad","House Pad"],["driveway","Driveway Base"],["culvert","Culvert"],["grading","Final Grade"]].map(([key, label]) => (
                  <SetupLine key={key} label={label} value={setup[key]} onChange={(v) => setLine(key, v)} gold={gold} border={border} textMuted={textMuted} textPrimary={textPrimary} mono={mono} serif={serif} goldBorder={goldBorder} />
                ))}
                <div style={{ fontSize: "0.6rem", color: textSub, fontFamily: mono, letterSpacing: "0.12em", textTransform: "uppercase", margin: "0.7rem 0 0.4rem" }}>Utilities</div>
                {[["septic","Septic System"],["plumbing","Plumbing to Septic"],["waterLine","Water Line"],["electric","Electric (Underground)"],["electricPost","Electrical Post"]].map(([key, label]) => (
                  <SetupLine key={key} label={label} value={setup[key]} onChange={(v) => setLine(key, v)} gold={gold} border={border} textMuted={textMuted} textPrimary={textPrimary} mono={mono} serif={serif} goldBorder={goldBorder} />
                ))}
                <div style={{ fontSize: "0.6rem", color: textSub, fontFamily: mono, letterSpacing: "0.12em", textTransform: "uppercase", margin: "0.7rem 0 0.4rem" }}>Home Setup</div>
                {[["setLevel","Set & Level"],["trimUpgrade","Interior Trim"],["fhaRetrofit","FHA Retrofit"],["skirting","Skirting"],["decks","Decks"],["hvac","HVAC"],["demo","Demo / Teardown"]].map(([key, label]) => (
                  <SetupLine key={key} label={label} value={setup[key]} onChange={(v) => setLine(key, v)} gold={gold} border={border} textMuted={textMuted} textPrimary={textPrimary} mono={mono} serif={serif} goldBorder={goldBorder} />
                ))}
                <div style={{ fontSize: "0.6rem", color: textSub, fontFamily: mono, letterSpacing: "0.12em", textTransform: "uppercase", margin: "0.7rem 0 0.4rem" }}>Custom</div>
                <SetupLine label={custom1Label} value={setup.custom1} onChange={(v) => setLine("custom1", v)} editable onLabelChange={setCustom1Label} gold={gold} border={border} textMuted={textMuted} textPrimary={textPrimary} mono={mono} serif={serif} goldBorder={goldBorder} />
                <SetupLine label={custom2Label} value={setup.custom2} onChange={(v) => setLine("custom2", v)} editable onLabelChange={setCustom2Label} gold={gold} border={border} textMuted={textMuted} textPrimary={textPrimary} mono={mono} serif={serif} goldBorder={goldBorder} />
                <div style={{ fontSize: "0.6rem", color: textSub, fontFamily: mono, letterSpacing: "0.12em", textTransform: "uppercase", margin: "0.7rem 0 0.4rem" }}>Contingency</div>
                <SetupLine label="Contingency / Buffer" value={setup.contingency} onChange={(v) => setLine("contingency", v)} gold={gold} border={border} textMuted={textMuted} textPrimary={textPrimary} mono={mono} serif={serif} goldBorder={goldBorder} />
                <div style={{ borderTop: `1px solid ${border}`, marginTop: "0.7rem", paddingTop: "0.55rem", display: "flex", justifyContent: "space-between" }}>
                  <span style={{ fontSize: "0.8rem", color: textPrimary, fontFamily: serif }}>Total Setup</span>
                  <span style={{ fontFamily: mono, fontSize: "0.85rem", color: gold }}>{fmt(setupTotal)}</span>
                </div>
              </Section>

              <Section>
                <Label>Commission</Label>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0.5rem" }}>
                  {[0.06, 0.03, 0].map((pct) => <Btn key={pct} active={commissionPct === pct} onClick={() => setCommissionPct(pct)}>{pct === 0 ? "0%" : `${pct * 100}%`}</Btn>)}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: "0.7rem", paddingTop: "0.5rem", borderTop: `1px solid ${border}` }}>
                  <span style={{ fontSize: "0.78rem", color: textMuted, fontFamily: serif }}>Commission Amount</span>
                  <span style={{ fontFamily: mono, fontSize: "0.82rem", color: gold }}>{fmt(commissionAmt)}</span>
                </div>
              </Section>

              <Section>
                <Label>Financing · 12% / 2.5 pts</Label>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(6,1fr)", gap: "0.4rem", marginBottom: "0.8rem" }}>
                  {[3,4,5,6,7,8].map((mo) => <Btn key={mo} active={loanMonths === mo} onClick={() => setLoanMonths(mo)}>{mo}mo</Btn>)}
                </div>
                <Row label="Origination (2.5 pts)" value={fmt(originationFee)} indent />
                <Row label={`Interest (${loanMonths} × ${fmt(monthlyInterest)}/mo)`} value={fmt(totalInterest)} indent />
                <div style={{ borderTop: `1px solid ${border}`, paddingTop: "0.4rem", marginTop: "0.2rem" }}>
                  <Row label="Total Financing" value={fmt(totalFinancing)} bold />
                </div>
              </Section>
            </div>

            {/* RIGHT */}
            <div>
              {/* Deal Indicator */}
              <Section>
                <div style={{ display: "flex", alignItems: "center", gap: "1rem" }}>
                  <div style={{ flexShrink: 0, width: "14px", height: "14px", borderRadius: "50%", background: dotColor, boxShadow: dotGlow }} />
                  <div>
                    <div style={{ fontSize: "0.62rem", letterSpacing: "0.15em", textTransform: "uppercase", color: dotColor, fontFamily: mono, fontWeight: "600" }}>{indicatorLabel}</div>
                    <div style={{ fontSize: "0.65rem", color: textMuted, fontFamily: serif, marginTop: "0.15rem" }}>Min. threshold: $35,000 net</div>
                  </div>
                </div>
              </Section>

              {/* Net Profit */}
              <Section style={{ textAlign: "center" }}>
                <div style={{ fontSize: "0.6rem", letterSpacing: "0.2em", textTransform: "uppercase", color: textMuted, fontFamily: mono, marginBottom: "0.5rem" }}>Net Profit</div>
                <div style={{ fontSize: "clamp(2rem,6vw,3rem)", fontWeight: "normal", color: profitColor, letterSpacing: "-0.03em", lineHeight: 1 }}>{fmt(netProfit)}</div>
                <div style={{ display: "flex", justifyContent: "center", gap: "2rem", marginTop: "0.8rem" }}>
                  <div>
                    <div style={{ fontSize: "0.6rem", color: textSub, fontFamily: mono, letterSpacing: "0.1em" }}>MARGIN</div>
                    <div style={{ fontSize: "0.9rem", fontFamily: mono, color: textPrimary }}>{fmtPct(margin)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: "0.6rem", color: textSub, fontFamily: mono, letterSpacing: "0.1em" }}>ROI</div>
                    <div style={{ fontSize: "0.9rem", fontFamily: mono, color: textPrimary }}>{fmtPct(roi)}</div>
                  </div>
                </div>
              </Section>

              {/* Cost Stack */}
              <Section>
                <Label>Cost Stack</Label>
                <Row label="Sale Price" value={fmt(salePrice)} bold />
                <Divider />
                <div style={{ fontSize: "0.65rem", color: textSub, fontFamily: mono, letterSpacing: "0.1em", textTransform: "uppercase", margin: "0.5rem 0 0.2rem" }}>Hard Costs</div>
                <Row label="Lot / Land" value={fmt(lotCost)} indent />
                <Row label={`Home — ${HOME_MODELS[homeModelIdx].name}`} value={fmt(homeCost)} indent />
                <Row label="Setup & Utilities" value={fmt(setupCost - contingency)} indent />
                <Row label="Contingency / Buffer" value={fmt(contingency)} indent />
                <Row label="Total Hard" value={fmt(totalHard)} bold />
                <div style={{ fontSize: "0.65rem", color: textSub, fontFamily: mono, letterSpacing: "0.1em", textTransform: "uppercase", margin: "0.7rem 0 0.2rem" }}>Financing</div>
                <Row label="Origination (2.5 pts)" value={fmt(originationFee)} indent />
                <Row label={`Interest · ${loanMonths} mo @ 12%`} value={fmt(totalInterest)} indent />
                <Row label="Total Financing" value={fmt(totalFinancing)} bold />
                <div style={{ fontSize: "0.65rem", color: textSub, fontFamily: mono, letterSpacing: "0.1em", textTransform: "uppercase", margin: "0.7rem 0 0.2rem" }}>Selling</div>
                <Row label={`Commission (${commissionPct * 100}%)`} value={fmt(commissionAmt)} indent />
                <Row label="Closing Costs (1.5%)" value={fmt(closingAmt)} indent />
                {sellerCredit > 0 && <Row label="Seller Credit" value={fmt(sellerCredit)} indent />}
                <Row label="Total Selling" value={fmt(totalSelling)} bold />
                <Divider />
                <Row label="Total All-In" value={fmt(totalCost)} bold />
                <div style={{ height: "0.3rem" }} />
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.32rem 0" }}>
                  <span style={{ fontSize: "0.8rem", color: textPrimary, fontFamily: serif, fontWeight: "600" }}>Net Profit</span>
                  <span style={{ fontFamily: mono, fontSize: "0.88rem", fontWeight: "600", color: profitColor }}>{fmt(netProfit)}</span>
                </div>
              </Section>

              {/* Loan Term Sensitivity */}
              <Section>
                <Label>Profit vs. Loan Term</Label>
                {[3,4,5,6,7,8].map((mo) => {
                  const int = (loanAmount * INTEREST_RATE / 12) * mo;
                  const orig = loanAmount * POINTS;
                  const net = salePrice - totalHard - (orig + int) - totalSelling;
                  const maxNet = salePrice - totalHard - (loanAmount * POINTS + (loanAmount * INTEREST_RATE / 12) * 3) - totalSelling;
                  const barW = Math.max(5, Math.min(100, (net / (maxNet || 1)) * 100));
                  const isActive = mo === loanMonths;
                  const barColor = net >= 35000 ? "#4ade80" : net >= 0 ? "#facc15" : "#f87171";
                  return (
                    <div key={mo} style={{ display: "flex", alignItems: "center", gap: "0.6rem", marginBottom: "0.45rem" }}>
                      <span style={{ fontFamily: mono, fontSize: "0.65rem", color: isActive ? gold : textSub, width: "2.5rem", flexShrink: 0 }}>{mo}mo</span>
                      <div style={{ flex: 1, background: "rgba(255,255,255,0.04)", borderRadius: "3px", height: "5px" }}>
                        <div style={{ width: `${barW}%`, height: "100%", borderRadius: "3px", background: isActive ? barColor : "rgba(255,255,255,0.12)" }} />
                      </div>
                      <span style={{ fontFamily: mono, fontSize: "0.72rem", color: isActive ? barColor : textMuted, width: "5rem", textAlign: "right", flexShrink: 0 }}>{fmt(net)}</span>
                    </div>
                  );
                })}
              </Section>

              {/* Sale Price Sensitivity */}
              <Section>
                <Label>Profit vs. Sale Price</Label>
                {[-20000,-10000,0,10000,20000].map((delta) => {
                  const sp = salePrice + delta;
                  const net = sp - totalHard - totalFinancing - (sp * commissionPct + sp * CLOSING + sellerCredit);
                  const isBase = delta === 0;
                  const barColor = net >= 35000 ? "#4ade80" : net >= 0 ? "#facc15" : "#f87171";
                  const maxNet = (salePrice + 20000) - totalHard - totalFinancing - ((salePrice + 20000) * commissionPct + (salePrice + 20000) * CLOSING + sellerCredit);
                  const barW = Math.max(5, Math.min(100, (net / (maxNet || 1)) * 100));
                  return (
                    <div key={delta} style={{ display: "flex", alignItems: "center", gap: "0.6rem", marginBottom: "0.45rem" }}>
                      <span style={{ fontFamily: mono, fontSize: "0.65rem", color: isBase ? gold : textSub, width: "3.5rem", flexShrink: 0 }}>{delta === 0 ? "Base" : `${delta > 0 ? "+" : ""}${delta/1000}k`}</span>
                      <div style={{ flex: 1, background: "rgba(255,255,255,0.04)", borderRadius: "3px", height: "5px" }}>
                        <div style={{ width: `${barW}%`, height: "100%", borderRadius: "3px", background: isBase ? barColor : "rgba(255,255,255,0.12)" }} />
                      </div>
                      <span style={{ fontFamily: mono, fontSize: "0.72rem", color: isBase ? barColor : textMuted, width: "5rem", textAlign: "right", flexShrink: 0 }}>{fmt(net)}</span>
                    </div>
                  );
                })}
              </Section>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
