<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Range Land Group — Deal Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #f8f8f8; color: #111; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; font-family: 'Inter', sans-serif; }
    input { font-family: 'JetBrains Mono', 'Courier New', monospace; color: #111; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    /* ── TOKENS ── */
    :root {
      --bg: #f8f8f8;
      --surface: #ffffff;
      --surface-2: #f4f4f5;
      --border: #e4e4e7;
      --border-strong: #d4d4d8;
      --text: #111111;
      --text-2: #52525b;
      --text-3: #a1a1aa;
      --accent: #1a56db;       /* electric blue — trust, precision */
      --accent-light: #eff4ff;
      --accent-border: #bfcffa;
      --green: #16a34a;
      --amber: #b45309;
      --red: #dc2626;
      --mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    /* ── LAYOUT ── */
    .app { min-height: 100vh; padding: 3rem 1.5rem 6rem; background: var(--bg); }
    .inner { max-width: 880px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    /* ── HEADER ── */
    .hdr { margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .hdr-left {}
    .hdr-logo { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; color: var(--text); }
    .hdr-logo span { color: var(--accent); }
    .hdr-sub { font-size: 0.75rem; color: var(--text-3); margin-top: 0.2rem; letter-spacing: 0.01em; }
    .hdr-badge { font-size: 0.7rem; font-family: var(--mono); background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); border-radius: 5px; padding: 0.3rem 0.7rem; font-weight: 500; }

    /* ── SECTIONS ── */
    .section { margin-bottom: 1.8rem; }
    .sec-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.85rem; display: flex; align-items: center; gap: 0.6rem; }
    .sec-label::after { content:''; flex:1; height:1px; background: var(--border); }
    .sub-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-3); margin: 0.9rem 0 0.5rem; }

    /* ── MODEL BUTTONS ── */
    .model-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 0.9rem; color: var(--text-2); font-size: 0.85rem; font-weight: 400; margin-bottom: 0.4rem; transition: all 0.12s; text-align: left; }
    .model-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .model-btn.active { background: var(--accent-light); border-color: var(--accent); border-width: 1.5px; color: var(--text); }
    .model-price { font-family: var(--mono); font-size: 0.8rem; color: var(--text-3); }
    .model-btn.active .model-price { color: var(--accent); font-weight: 500; }

    /* ── TOGGLE BUTTONS ── */
    .tg { display: grid; gap: 0.35rem; }
    .tg-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 0.5rem 0.3rem; color: var(--text-3); font-size: 0.8rem; font-weight: 400; transition: all 0.12s; }
    .tg-btn:hover { border-color: var(--border-strong); color: var(--text-2); }
    .tg-btn.active { background: var(--accent-light); border-color: var(--accent); border-width: 1.5px; color: var(--accent); font-weight: 600; }

    /* ── INPUTS ── */
    .field { margin-bottom: 0.9rem; }
    .field-lbl { font-size: 0.7rem; font-weight: 500; color: var(--text-2); margin-bottom: 0.35rem; letter-spacing: 0.01em; }
    .field-row { position: relative; }
    .field-pre { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-3); font-family: var(--mono); font-size: 0.85rem; pointer-events: none; }
    .field-inp { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.75rem 0.65rem 1.7rem; color: var(--text); font-family: var(--mono); font-size: 0.88rem; outline: none; transition: border-color 0.15s, box-shadow 0.15s; -webkit-appearance: none; }
    .field-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }

    /* ── SETUP LINES ── */
    .sl { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.38rem; }
    .sl-lbl { flex: 1; font-size: 0.8rem; color: var(--text-3); }
    .sl-lbl-inp { flex: 1; background: transparent; border: 1px solid transparent; border-radius: 4px; padding: 0.25rem 0.4rem; color: var(--text-3); font-size: 0.78rem; outline: none; font-family: 'Inter', sans-serif; }
    .sl-lbl-inp:focus { border-color: var(--border); background: var(--surface); }
    .sl-wrap { position: relative; width: 90px; flex-shrink: 0; }
    .sl-pre { position: absolute; left: 0.5rem; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 0.72rem; pointer-events: none; font-family: var(--mono); }
    .sl-inp { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.32rem 0.4rem 0.32rem 1.1rem; color: var(--text); font-family: var(--mono); font-size: 0.78rem; outline: none; -webkit-appearance: none; }
    .sl-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(26,86,219,0.1); }
    .sl-total { display: flex; justify-content: space-between; padding-top: 0.65rem; margin-top: 0.4rem; border-top: 1px solid var(--border); }
    .sl-total-lbl { font-size: 0.83rem; font-weight: 600; color: var(--text); }
    .sl-total-val { font-family: var(--mono); font-size: 0.88rem; font-weight: 600; color: var(--text); }

    /* ── INDICATOR ── */
    .indicator { display: flex; align-items: center; gap: 0.9rem; padding: 1rem 1.1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; }
    .ind-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .ind-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
    .ind-sub { font-size: 0.68rem; color: var(--text-3); margin-top: 0.15rem; }

    /* ── PROFIT CARD ── */
    .profit-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem 1.2rem 1.4rem; margin-bottom: 1.5rem; text-align: center; }
    .profit-lbl { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.6rem; }
    .profit-val { font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 300; letter-spacing: -0.04em; line-height: 1; font-family: 'Inter', sans-serif; }
    .profit-meta { display: flex; justify-content: center; gap: 0; margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .meta-item { flex: 1; text-align: center; }
    .meta-item:first-child { border-right: 1px solid var(--border); }
    .meta-lbl { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }
    .meta-val { font-size: 1rem; font-family: var(--mono); color: var(--text); margin-top: 0.25rem; font-weight: 500; }

    /* ── COST STACK ── */
    .cs-row { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; }
    .cs-lbl { font-size: 0.8rem; color: var(--text-2); }
    .cs-val { font-family: var(--mono); font-size: 0.8rem; color: var(--text-2); }
    .cs-row.in { padding-left: 0.9rem; }
    .cs-row.in .cs-lbl { font-size: 0.76rem; color: var(--text-3); }
    .cs-row.in .cs-val { font-size: 0.76rem; color: var(--text-3); }
    .cs-row.b .cs-lbl { font-weight: 600; color: var(--text); font-size: 0.84rem; }
    .cs-row.b .cs-val { font-weight: 600; color: var(--text); font-size: 0.84rem; }
    .cs-row.neg .cs-val { color: var(--red); }
    .cs-div { height: 1px; background: var(--border); margin: 0.5rem 0; }
    .cs-cat { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin: 0.7rem 0 0.25rem; }
    .cs-net { display: flex; justify-content: space-between; padding: 0.6rem 0; margin-top: 0.25rem; border-top: 2px solid var(--text); }
    .cs-net-lbl { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .cs-net-val { font-family: var(--mono); font-size: 0.9rem; font-weight: 700; }

    /* ── SENSITIVITY ── */
    .sens-row { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.55rem; }
    .sens-lbl { font-family: var(--mono); font-size: 0.66rem; width: 3.2rem; flex-shrink: 0; color: var(--text-3); }
    .sens-lbl.a { color: var(--accent); font-weight: 600; }
    .sens-track { flex: 1; height: 4px; background: var(--surface-2); border-radius: 3px; }
    .sens-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .sens-val { font-family: var(--mono); font-size: 0.72rem; width: 5.5rem; text-align: right; flex-shrink: 0; color: var(--text-3); }
    .sens-val.a { font-weight: 600; }

    /* ── INLINE ROW ── */
    .inline-row { display: flex; justify-content: space-between; align-items: center; padding: 0.32rem 0; border-bottom: 1px solid var(--border); }
    .inline-row:last-child { border-bottom: none; }
    .inline-lbl { font-size: 0.78rem; color: var(--text-3); }
    .inline-val { font-family: var(--mono); font-size: 0.78rem; color: var(--text-2); }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const DEFAULT_MODELS=[{name:"TRU Redwood",cost:73000},{name:"TRU Sycamore",cost:68000},{name:"TRU Oak",cost:57000},{name:"Custom / Other",cost:0}];
const S={homeIdx:1,customHome:73000,customHomeName:"Custom Model",
  modelCosts:[73000,68000,57000,0],
  dealName:"", dealAddress:"",
  lotCost:70000,salePrice:260000,loanMonths:5,commPct:0.06,sellerCredit:0,
  financed:true,
  ltcPct:90, ltvCapPct:70, buyerClosingCosts:2000,
  interestRate:12, originationPts:2.5,
  setup:{housePad:2000,driveway:1200,culvert:700,grading:1200,septic:8500,plumbing:400,waterLine:700,electric:2200,electricPost:2000,setLevel:7250,trimUpgrade:3300,fhaRetrofit:3000,skirting:3000,decks:3000,hvac:4000,demo:0,custom1:0,custom2:0,contingency:2500},
  c1lbl:"Custom Item 1",c2lbl:"Custom Item 2",
  taxRate:1.85,
  holding:{insurance:1200,maintenance:500,hoa:0,utilities:0,custom:0},hcLbl:"Other"
};
const IR=0.12,PTS=0.025,CLSP=0.015,MINP=35000;
const fmt=n=>n<0?`-$${Math.abs(Math.round(n)).toLocaleString()}`:`$${Math.round(n).toLocaleString()}`;
const fmtP=n=>`${(n*100).toFixed(1)}%`;
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

function recalc(){
  const hc = S.homeIdx===DEFAULT_MODELS.length-1 ? S.customHome : S.modelCosts[S.homeIdx];
  const modelName = S.homeIdx===DEFAULT_MODELS.length-1 ? S.customHomeName : DEFAULT_MODELS[S.homeIdx].name;

  // Hard cost = lot + home + all setup items (setup total includes contingency)
  const st = Object.values(S.setup).reduce((a,b)=>a+b, 0);
  const hard = S.lotCost + hc + st;

  // Holding costs — property tax pro-rated to hold period
  const propTax = Math.round(hard * (S.taxRate/100) * (S.loanMonths/12));
  const ht = propTax + Object.values(S.holding).reduce((a,b)=>a+b, 0);

  // Financing — zeroed when cash deal
  let loanAmt=0, loanByLTC=0, loanByLTV=0, ltc=0, ltv=0;
  let orig=0, intr=0, tfin=0;
  let downPayment=hard, cashToClose=hard+S.buyerClosingCosts;

  if(S.financed){
    loanByLTC = Math.round(hard * (S.ltcPct/100));
    loanByLTV = Math.round(S.salePrice * (S.ltvCapPct/100));
    loanAmt   = Math.min(loanByLTC, loanByLTV);
    ltc       = loanAmt / hard;
    ltv       = loanAmt / S.salePrice;
    orig      = loanAmt * (S.originationPts/100);
    intr      = (loanAmt * (S.interestRate/100) / 12) * S.loanMonths;
    tfin      = orig + intr;
    downPayment  = hard - loanAmt;
    cashToClose  = downPayment + orig + S.buyerClosingCosts;
  }

  // Selling costs — based on sale price
  const comm   = S.salePrice * S.commPct;
  const cls    = S.salePrice * CLSP;           // buyer closing credit 1.5% of sale
  const tsell  = comm + cls + S.sellerCredit;

  // Totals
  const total  = hard + tfin + ht + tsell;
  const net    = S.salePrice - total;

  // Returns
  const roi    = hard > 0 ? net / hard : 0;
  const margin = S.salePrice > 0 ? net / S.salePrice : 0;
  const coc    = cashToClose > 0 ? net / cashToClose : null;

  // Break-even: net = 0 → sp - hard - tfin - ht - (sp*commPct + sp*CLSP + sellerCredit) = 0
  // sp*(1 - commPct - CLSP) = hard + tfin + ht + sellerCredit
  const breakEven = Math.ceil((hard + tfin + ht + S.sellerCredit) / (1 - S.commPct - CLSP));

  return{hc,modelName,st,ht,hard,loanAmt,loanByLTC,loanByLTV,ltc,ltv,
    orig,intr,tfin,comm,cls,tsell,total,net,downPayment,cashToClose,
    roi,margin,propTax,breakEven,coc};
}

function render(){document.getElementById("app").innerHTML=buildApp();}

function buildApp(){
  const c=recalc();
  const good=c.net>=MINP,warn=c.net>=0&&c.net<MINP;
  const dc=good?"#16a34a":warn?"#b45309":"#dc2626";
  const dg=good?"0 0 0 3px rgba(22,163,74,0.15)":warn?"0 0 0 3px rgba(180,83,9,0.15)":"0 0 0 3px rgba(220,38,38,0.15)";
  const il=good?"GO — Clears Threshold":warn?"Caution — Below $35K":"No Go — Negative Return";
  const pc=good?"#16a34a":warn?"#b45309":"#dc2626";

  return`<div class="app"><div class="inner">

  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">Range <span>Land Group</span></div>
      <div class="hdr-sub">Home + Land Deal Calculator</div>
    </div>
    <div class="hdr-badge">v2.0</div>
  </div>

  <div class="grid">

  <!-- ── LEFT ── -->
  <div>

    <div class="section">
      <div class="sec-label">Home Model</div>
      ${DEFAULT_MODELS.map((m,i)=>{
        const isCustom=i===DEFAULT_MODELS.length-1;
        const activeCost=isCustom?S.customHome:S.modelCosts[i];
        const defaultCost=m.cost;
        const isActive=S.homeIdx===i;
        const defaultNote=(!isCustom&&isActive)?`<div style="font-size:0.6rem;color:var(--text-3);text-align:right;margin-top:-0.2rem;margin-bottom:0.4rem;padding-right:0.2rem">default: ${fmt(defaultCost)}</div>`:"";
        const costInput=!isCustom?`<div style="position:relative">
          <span style="position:absolute;left:0.5rem;top:50%;transform:translateY(-50%);color:var(--text-3);font-family:var(--mono);font-size:0.75rem;pointer-events:none">$</span>
          <input style="width:100%;height:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:0 0.4rem 0 1.3rem;color:var(--text);font-family:var(--mono);font-size:0.82rem;outline:none;-webkit-appearance:none;min-height:38px;"
            type="tel" inputmode="numeric" value="${activeCost}"
            onblur="S.modelCosts[${i}]=parseInt(this.value.replace(/[^0-9]/g,''))||${defaultCost};render()"
            onkeydown="if(event.key==='Enter')this.blur()" />
        </div>`:"";
        return `<div style="display:grid;grid-template-columns:1fr${!isCustom?" 90px":""};gap:0.4rem;margin-bottom:0.4rem;align-items:stretch">
          <button class="model-btn${isActive?" active":""}" onclick="S.homeIdx=${i};render()">
            <span>${m.name}</span>
            <span class="model-price">${isCustom?"—":fmt(activeCost)}</span>
          </button>
          ${costInput}
        </div>${defaultNote}`;
      }).join("")}
      ${S.homeIdx===DEFAULT_MODELS.length-1?`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-top:0.7rem">
          <div class="field">
            <div class="field-lbl">Model Name</div>
            <input class="field-inp" style="padding-left:0.75rem" type="text" value="${esc(S.customHomeName)}"
              onblur="S.customHomeName=this.value||'Custom Model';render()"
              onkeydown="if(event.key==='Enter')this.blur()" />
          </div>
          <div class="field">
            <div class="field-lbl">Cost</div>
            <div class="field-row"><span class="field-pre">$</span>
              <input class="field-inp" type="tel" inputmode="numeric" value="${S.customHome}"
                onblur="S.customHome=parseInt(this.value.replace(/[^0-9]/g,''))||0;render()"
                onkeydown="if(event.key==='Enter')this.blur()" />
            </div>
          </div>
        </div>`:""}
    </div>

    <div class="section">
      <div class="sec-label">Deal Info</div>
      <div class="field">
        <div class="field-lbl">Deal Name</div>
        <input class="field-inp" style="padding-left:0.75rem" type="text" value="${esc(S.dealName)}"
          placeholder="e.g. Alvarado Lot 3"
          onblur="S.dealName=this.value;render()"
          onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
      <div class="field">
        <div class="field-lbl">Property Address</div>
        <input class="field-inp" style="padding-left:0.75rem" type="text" value="${esc(S.dealAddress)}"
          placeholder="e.g. 4200 County Rd 107, Alvarado TX"
          onblur="S.dealAddress=this.value;render()"
          onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
    </div>

    <div class="section">
      <div class="sec-label">Deal Variables</div>
      ${nf("Lot Cost","S.lotCost")}
      ${nf("Sale Price / ARV","S.salePrice")}
      ${nf("Seller Credit to Buyer","S.sellerCredit")}
      ${S.sellerCredit>0?`<div style="font-size:0.68rem;color:var(--text-3);margin-top:-0.3rem;margin-bottom:0.6rem">${fmtP(S.sellerCredit/S.salePrice)} of sale price</div>`:""}
    </div>

    <div class="section">
      <div class="sec-label">Commission</div>
      <div class="tg" style="grid-template-columns:1fr 1fr 1fr">
        ${[0.06,0.03,0].map(p=>`<button class="tg-btn${S.commPct===p?" active":""}" onclick="S.commPct=${p};render()">${p===0?"0%":p*100+"%"}</button>`).join("")}
      </div>
      <div style="display:flex;justify-content:space-between;padding-top:0.65rem;margin-top:0.6rem;border-top:1px solid var(--border)">
        <span style="font-size:0.8rem;color:var(--text-3)">Commission Amount</span>
        <span style="font-family:var(--mono);font-size:0.82rem;color:var(--text);font-weight:500">${fmt(c.comm)}</span>
      </div>
    </div>

    <div class="section">
      <!-- Financing toggle -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div class="sec-label" style="margin-bottom:0">Financing</div>
        <div style="display:flex;gap:0.35rem">
          <button onclick="S.financed=true;render()" style="font-size:0.68rem;font-family:'Inter',sans-serif;font-weight:${S.financed?"600":"400"};padding:0.35rem 0.8rem;border-radius:5px;border:1px solid ${S.financed?"var(--accent)":"var(--border)"};background:${S.financed?"var(--accent-light)":"var(--surface)"};color:${S.financed?"var(--accent)":"var(--text-3)"}">Financed</button>
          <button onclick="S.financed=false;render()" style="font-size:0.68rem;font-family:'Inter',sans-serif;font-weight:${!S.financed?"600":"400"};padding:0.35rem 0.8rem;border-radius:5px;border:1px solid ${!S.financed?"#16a34a":"var(--border)"};background:${!S.financed?"#f0fdf4":"var(--surface)"};color:${!S.financed?"#16a34a":"var(--text-3)"}">Cash Deal</button>
        </div>
      </div>

      ${S.financed?`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:0.9rem">
        <div>
          <div class="field-lbl">Interest Rate</div>
          <div style="position:relative">
            <input style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.6rem 1.5rem 0.6rem 0.75rem;color:var(--text);font-family:var(--mono);font-size:0.88rem;outline:none;-webkit-appearance:none;"
              type="tel" inputmode="decimal" value="${S.interestRate}"
              onblur="S.interestRate=parseFloat(this.value)||12;render()"
              onkeydown="if(event.key==='Enter')this.blur()" />
            <span style="position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);font-size:0.75rem;color:var(--text-3);pointer-events:none">%</span>
          </div>
          <div style="font-size:0.62rem;color:var(--text-3);margin-top:0.3rem">Default: 12%</div>
        </div>
        <div>
          <div class="field-lbl">Origination Points</div>
          <div style="position:relative">

function nf(label,key){
  const val=eval(key);
  return`<div class="field"><div class="field-lbl">${label}</div>
    <div class="field-row"><span class="field-pre">$</span>
      <input class="field-inp" type="tel" inputmode="numeric" value="${val}"
        onblur="${key}=parseInt(this.value.replace(/[^0-9]/g,''))||0;render()"
        onkeydown="if(event.key==='Enter')this.blur()" />
    </div></div>`;
}
function sl(key,lbl){
  return`<div class="sl"><span class="sl-lbl">${lbl}</span>
    <div class="sl-wrap"><span class="sl-pre">$</span>
      <input class="sl-inp" type="tel" inputmode="numeric" value="${S.setup[key]}"
        onblur="S.setup['${key}']=parseInt(this.value.replace(/[^0-9]/g,''))||0;render()"
        onkeydown="if(event.key==='Enter')this.blur()" />
    </div></div>`;
}
function hl(key,lbl){
  return`<div class="sl"><span class="sl-lbl">${lbl}</span>
    <div class="sl-wrap"><span class="sl-pre">$</span>
      <input class="sl-inp" type="tel" inputmode="numeric" value="${S.holding[key]}"
        onblur="S.holding['${key}']=parseInt(this.value.replace(/[^0-9]/g,''))||0;render()"
        onkeydown="if(event.key==='Enter')this.blur()" />
    </div></div>`;
}
function cr(label,value,indent,bold){
  const neg=String(value).startsWith("-");
  return`<div class="cs-row${indent?" in":""}${bold?" b":""}${neg?" neg":""}">
    <span class="cs-lbl">${label}</span><span class="cs-val">${value}</span>
  </div>`;
}

function printPDF(){
  const c=recalc();
  const good=c.net>=MINP,warn=c.net>=0&&c.net<MINP;
  const pc=good?"#16a34a":warn?"#b45309":"#dc2626";
  const il=good?"GO — Clears $35K Threshold":warn?"CAUTION — Below $35K Threshold":"NO GO — Negative Return";
  const today=new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const modelName=c.modelName;
  const ltvCol=c.ltv<=0.65?"#16a34a":c.ltv<=0.75?"#b45309":"#dc2626";
  const ltvLabel=c.ltv<=0.65?"Strong":c.ltv<=0.75?"Acceptable":"High Risk";

  const row=(l,v,indent,bold)=>`<tr style="${bold?"font-weight:600;border-top:1px solid #ccc":""}">
    <td style="padding:${bold?"6px 8px":"4px 8px 4px "+(indent?"24px":"8px")};color:${bold?"#111":"#444"};font-size:${bold?"13px":"12px"}">${l}</td>
    <td style="padding:${bold?"6px 8px":"4px 8px"};text-align:right;font-family:'Courier New',monospace;color:${bold?"#111":v.startsWith("-")?"#dc2626":"#333"};font-size:${bold?"13px":"12px"};font-weight:${bold?"600":"400"}">${v}</td>
  </tr>`;

  const win=window.open("","_blank");
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Range Land Group — Deal Analysis</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#111;background:#fff;padding:48px;font-size:13px;line-height:1.5}

    h1{font-size:22px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;color:#111}
    h2{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#999;margin:24px 0 8px;border-bottom:2px solid #111;padding-bottom:4px}
    table{width:100%;border-collapse:collapse}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:8px}
    .meta{display:flex;gap:32px;margin:16px 0 24px;padding:16px;background:#f8f8f8;border-radius:6px}
    .meta-item{text-align:center;flex:1}
    .meta-lbl{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999}
    .meta-val{font-size:22px;font-weight:300;font-family:'Courier New',monospace;margin-top:4px}
    .indicator{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:6px;margin-bottom:20px}
    .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .ind-lbl{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
    .footer{margin-top:40px;padding-top:16px;border-top:1px solid #ddd;font-size:10px;color:#aaa;display:flex;justify-content:space-between}
    .net-row{display:flex;justify-content:space-between;padding:8px;background:#111;color:#fff;border-radius:4px;margin-top:8px}
    .net-lbl{font-size:14px;font-weight:700}
    .net-val{font-family:'Courier New',monospace;font-size:14px;font-weight:700;color:${pc}}
  </style></head><body>

  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #111">
    <div>
      <h1>Range Land Group</h1>
      <div style="font-size:11px;color:#999;margin-top:4px;letter-spacing:0.08em;text-transform:uppercase">Home + Land Deal Analysis</div>
      ${S.dealName?`<div style="font-size:15px;font-weight:600;color:#111;margin-top:8px">${esc(S.dealName)}</div>`:""}
      ${S.dealAddress?`<div style="font-size:11px;color:#666;margin-top:2px">${esc(S.dealAddress)}</div>`:""}
    </div>
    <div style="text-align:right;font-size:11px;color:#999">
      <div>Prepared: ${today}</div>
      <div style="margin-top:2px">Emerton Homes · Range Land Group</div>
    </div>
  </div>

  <div class="indicator" style="background:${good?"#f0fdf4":warn?"#fffbeb":"#fef2f2"};border:1px solid ${good?"#bbf7d0":warn?"#fde68a":"#fecaca"}">
    <div class="dot" style="background:${pc}"></div>
    <div class="ind-lbl" style="color:${pc}">${il}</div>
  </div>

  <div class="meta">
    <div class="meta-item"><div class="meta-lbl">Net Profit</div><div class="meta-val" style="color:${pc}">${fmt(c.net)}</div></div>
    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">Margin</div><div class="meta-val">${fmtP(c.margin)}</div></div>
    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">ROI</div><div class="meta-val">${fmtP(c.roi)}</div></div>
    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">CoC Return</div><div class="meta-val">${c.coc!==null?fmtP(c.coc):"—"}</div></div>
    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">Cash to Close</div><div class="meta-val">${fmt(c.cashToClose)}</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px">
    <div style="padding:12px;background:#f8f8f8;border-radius:6px;text-align:center">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999">LTV</div>
      <div style="font-size:20px;font-family:'Courier New',monospace;font-weight:600;color:${ltvCol};margin-top:4px">${fmtP(c.ltv)}</div>
      <div style="font-size:10px;color:${ltvCol};margin-top:2px">Loan-to-Value · ${ltvLabel}</div>
    </div>
    <div style="padding:12px;background:#f8f8f8;border-radius:6px;text-align:center">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999">Break-Even</div>
      <div style="font-size:20px;font-family:'Courier New',monospace;font-weight:600;color:#111;margin-top:4px">${fmt(c.breakEven)}</div>
      <div style="font-size:10px;color:#666;margin-top:2px">${fmt(S.salePrice-c.breakEven)} cushion to ARV</div>
    </div>
    <div style="padding:12px;background:#f8f8f8;border-radius:6px;text-align:center">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999">Cash-on-Cash</div>
      <div style="font-size:20px;font-family:'Courier New',monospace;font-weight:600;color:#111;margin-top:4px">${c.coc!==null?fmtP(c.coc):"—"}</div>
      <div style="font-size:10px;color:#666;margin-top:2px">${c.cashIn?fmt(S.cashIn)+" cash deployed":"Cash-in not set"}</div>
    </div>
  </div>

  <div>

      ${row("Lot / Land",fmt(S.lotCost),true)}

      ${row("Driveway Base",fmt(S.setup.driveway),true)}
      ${row("Culvert",fmt(S.setup.culvert),true)}
      ${row("Final Grade",fmt(S.setup.grading),true)}
      <tr><td colspan="2" style="padding:6px 8px;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#aaa">Utilities</td></tr>
      ${row("Septic System",fmt(S.setup.septic),true)}
      ${row("Plumbing to Septic",fmt(S.setup.plumbing),true)}
      ${row("Water Line",fmt(S.setup.waterLine),true)}
      ${row("Electric (Underground)",fmt(S.setup.electric),true)}
      ${row("Electrical Post",fmt(S.setup.electricPost),true)}
      <tr><td colspan="2" style="padding:6px 8px;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#aaa">Home Setup</td></tr>
      ${row("Set & Level",fmt(S.setup.setLevel),true)}
      ${row("Interior Trim",fmt(S.setup.trimUpgrade),true)}
      ${row("FHA Retrofit",fmt(S.setup.fhaRetrofit),true)}
      ${row("Skirting",fmt(S.setup.skirting),true)}
      ${row("Decks",fmt(S.setup.decks),true)}
      ${row("HVAC",fmt(S.setup.hvac),true)}
      ${S.setup.demo?row("Demo / Teardown",fmt(S.setup.demo),true):""}
      ${S.setup.custom1?row(S.c1lbl,fmt(S.setup.custom1),true):""}
      ${S.setup.custom2?row(S.c2lbl,fmt(S.setup.custom2),true):""}
      ${row("Contingency / Buffer",fmt(S.setup.contingency),true)}
      ${row("Total Hard Cost",fmt(c.hard),false,true)}
    </table>
  </div>

  <div>
    <h2>Financing</h2>
    <table>
      ${S.financed?`
      ${row("Hard Cost (Loan Basis)",fmt(c.hard),true)}
      ${row(`LTC % (Lender covers)`,S.ltcPct+"% → "+fmt(c.loanByLTC),true)}
      ${row(`LTV Cap (Max of ARV)`,S.ltvCapPct+"% → "+fmt(c.loanByLTV),true)}
      ${row(`Loan Amount (MIN of above)`,fmt(c.loanAmt),false,true)}
      ${row(`Interest Rate`,S.interestRate+"%",true)}
      ${row(`Origination Points`,S.originationPts+" pts",true)}
      ${row(`Loan Term`,S.loanMonths+" months",true)}
      ${row(`Origination Fee`,fmt(c.orig),true)}
      ${row(`Interest (${S.loanMonths} mo @ ${S.interestRate}%)`,fmt(c.intr),true)}
      ${row("Total Financing",fmt(c.tfin),false,true)}`
      :row("Cash Deal — No Financing","$0",false,true)}
    </table>

    <h2>Est. Cash to Close</h2>
    <table>
      ${S.financed?`
      ${row("Hard Cost",fmt(c.hard),true)}
      ${row("Less: Loan Amount","- "+fmt(c.loanAmt),true)}
      ${row("Down Payment",fmt(c.downPayment),false,true)}
      ${row("Origination Fee",fmt(c.orig),true)}
      ${row("Buyer Closing Costs",fmt(S.buyerClosingCosts),true)}
      ${row("Est. Cash to Close",fmt(c.cashToClose),false,true)}`
      :`${row("Hard Cost (full cash)",fmt(c.hard),true)}
      ${row("Buyer Closing Costs",fmt(S.buyerClosingCosts),true)}
      ${row("Est. Cash to Close",fmt(c.cashToClose),false,true)}`}
    </table>

    <h2>Holding Costs</h2>
    <table>
      ${row(`Property Taxes (${S.taxRate}% · ${S.loanMonths}mo)`,fmt(c.propTax),true)}
      ${S.holding.insurance?row("Insurance",fmt(S.holding.insurance),true):""}
      ${S.holding.maintenance?row("Maintenance",fmt(S.holding.maintenance),true):""}
      ${S.holding.hoa?row("HOA / POA",fmt(S.holding.hoa),true):""}
      ${S.holding.utilities?row("Utilities",fmt(S.holding.utilities),true):""}
      ${S.holding.custom?row(S.hcLbl,fmt(S.holding.custom),true):""}
      ${row("Total Holding",fmt(c.ht),false,true)}
    </table>

    <h2>Selling Costs</h2>
    <table>
      ${row(`Commission (${S.commPct*100}%)`,fmt(c.comm),true)}
      ${row("Closing Costs (1.5%)",fmt(c.cls),true)}
      ${S.sellerCredit?row("Seller Credit to Buyer",fmt(S.sellerCredit),true):""}
      ${row("Total Selling",fmt(c.tsell),false,true)}
    </table>

    <h2>Summary</h2>
    <table>
      ${row("Sale Price / ARV",fmt(S.salePrice),false,true)}
      ${row("Total Hard Cost",fmt(c.hard),true)}
      ${row("Total Financing",fmt(c.tfin),true)}
      ${row("Total Holding",fmt(c.ht),true)}
      ${row("Total Selling",fmt(c.tsell),true)}
      ${row("Total All-In",fmt(c.total),false,true)}
      ${row("LTV (Loan / ARV)",fmtP(c.ltv)+" — "+ltvLabel,true)}
      ${row("Break-Even Sale Price",fmt(c.breakEven),true)}
      ${row("Est. Cash to Close",fmt(c.cashToClose),true)}
    </table>
    <div class="net-row"><span class="net-lbl">Net Profit</span><span class="net-val">${fmt(c.net)}</span></div>
  </div>
  </div>

  <div class="footer">
    <span>Range Land Group · Emerton Homes · Confidential</span>
    <span>Generated ${today}</span>
  </div>

  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`);
  win.document.close();
}

render();
</script>
</body>
</html>
