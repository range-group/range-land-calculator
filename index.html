/* ═══════════════════════════════════════════
   AI DEAL MEMO GENERATOR
   ═══════════════════════════════════════════ */
function generateMemo(type){
  // Build deal summary from current state
  let dealData='';
  const today=new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});

  if(type==='home'){
    const c=recalc();
    dealData=`
HOME + LAND DEAL ANALYSIS
Deal: ${S.dealName||'Unnamed'} | ${S.dealAddress||'No address'} | ${today}
Notes: ${S.notes||'None'}
Home Model: ${c.modelName} (${c.sqft?c.sqft+' sqft':''}) - Cost: ${fmt(c.hc)}
Lot Cost: ${fmt(S.lotCost)} | Sale Price/ARV: ${fmt(S.salePrice)}
${c.sqft?'Price/sqft: $'+c.priceSqft+' | Cost/sqft: $'+c.costSqft:''}
Setup Costs: ${fmt(c.st)} | Total Hard Cost: ${fmt(c.hard)}
Financing: ${S.financed?fmt(c.loanAmt)+' loan at '+S.interestRate+'% for '+S.loanMonths+'mo, '+fmt(c.tfin)+' total financing':'Cash deal'}
${S.financed?'LTV: '+fmtP(c.ltv)+' | Down Payment: '+fmt(c.downPayment):''}
Holding Costs: ${fmt(c.ht)} (${S.loanMonths} months)
Selling Costs: ${fmt(c.tsell)} (${S.commPct*100}% commission)
Seller Credit: ${fmt(S.sellerCredit)}
Total All-In: ${fmt(c.total)}
NET PROFIT: ${fmt(c.net)} | Margin: ${fmtP(c.margin)} | ROI: ${fmtP(c.roi)}
Cash to Close: ${fmt(c.cashToClose)} | CoC Return: ${c.coc!==null?fmtP(c.coc):'N/A'}
Break-Even: ${fmt(c.breakEven)} | Cushion: ${fmt(S.salePrice-c.breakEven)}
Go/No-Go: ${c.net>=35000?'GO - Clears $35K threshold':c.net>=0?'CAUTION - Below $35K':'NO GO - Negative return'}`;
  } else {
    const d=S.sub;
    const numLots=Math.max(1,Math.floor(d.totalFrontage/d.ftPerLot));
    const numMeters=d.numMetersOverride>0?d.numMetersOverride:numLots;
    const waterCost=numMeters*d.waterMeterCost;
    const electricTotal=d.electricPerLot*numLots;
    const totalInfra=waterCost+d.miscWaterCost+electricTotal+d.surveyCost+d.roadCost+d.attorneyFees+d.filingFees+d.custom1+d.custom2;
    const buyClosing=d.buyClosingOverride>0?d.buyClosingOverride:Math.round(d.landPrice*0.005);
    const hardCost=d.landPrice+totalInfra+buyClosing;
    let loanAmt=0,totalFin=0;
    if(d.financed){loanAmt=Math.round(hardCost*(d.ltcPct/100));const origFee=Math.round(loanAmt*(d.originationPts/100));const interest=Math.round((loanAmt*(d.interestRate/100)/12)*d.loanMonths);totalFin=origFee+interest;}
    const holdPropTax=Math.round(hardCost*(d.holdTaxRate/100)*(d.loanMonths/12));
    const totalHold=holdPropTax+d.holdInsurance+d.holdMaint;
    let rollbackTotal=0;
    if(d.agExemption&&d.marketValue>d.agValue){const ad=(d.marketValue-d.agValue)*(d.holdTaxRate/100);rollbackTotal=Math.round(ad*d.rollbackYears)+Math.round(ad*(d.rollbackInterest/100)*(d.rollbackYears*(d.rollbackYears+1)/2));}
    const totalBasis=hardCost+totalFin+totalHold+rollbackTotal;
    // Exits
    const t_rev=numLots*d.lotArvTrad,t_sell=Math.round(t_rev*d.commPct)+Math.round(t_rev*0.01),t_net=t_rev-totalBasis-t_sell;
    const sf_downLot=Math.round(d.lotArvSF*(d.sfDownPct/100)),sf_loanLot=d.lotArvSF-sf_downLot,sf_r=d.sfRate/100/12,sf_n=d.sfTermYrs*12;
    const sf_pmtLot=sf_r>0?sf_loanLot*(sf_r*Math.pow(1+sf_r,sf_n))/(Math.pow(1+sf_r,sf_n)-1):sf_loanLot/sf_n;
    const sf_totalRev=(sf_downLot+sf_pmtLot*sf_n)*numLots,sf_net=sf_totalRev-totalBasis-Math.round(numLots*d.lotArvSF*0.005);
    const mh_totalCost=totalBasis+numLots*d.mhHomeCost+numLots*d.mhSetupCost,mh_rev=numLots*d.lotArvMH;
    const mh_sell=Math.round(mh_rev*d.commPct)+Math.round(mh_rev*0.01),mh_net=mh_rev-mh_totalCost-mh_sell;

    dealData=`
LAND SUBDIVISION ANALYSIS
Deal: ${S.dealName||'Unnamed'} | ${S.dealAddress||'No address'} | ${today}
Notes: ${S.notes||'None'}
Land Price: ${fmt(d.landPrice)} | Frontage: ${d.totalFrontage}ft | Lot Width: ${d.ftPerLot}ft
Number of Lots: ${numLots}
Infrastructure: ${fmt(totalInfra)} (Water: ${fmt(waterCost+d.miscWaterCost)}, Electric: ${fmt(electricTotal)}, Survey: ${fmt(d.surveyCost)}, Road: ${fmt(d.roadCost)})
Buy Closing: ${fmt(buyClosing)} | Hard Cost: ${fmt(hardCost)}
Financing: ${d.financed?fmt(loanAmt)+' loan at '+d.interestRate+'% for '+d.loanMonths+'mo, '+fmt(totalFin)+' total financing':'Cash deal'}
Holding: ${fmt(totalHold)} (${d.loanMonths} months)
${rollbackTotal?'Rollback Taxes (Ag Exemption): '+fmt(rollbackTotal):'No ag exemption rollback'}
Total Basis: ${fmt(totalBasis)} | Per Lot: ${fmt(Math.round(totalBasis/numLots))}

EXIT STRATEGY 1 - Traditional Lot Sale:
ARV/lot: ${fmt(d.lotArvTrad)} | Revenue: ${fmt(t_rev)} | Net: ${fmt(t_net)} | Per lot: ${fmt(Math.round(t_net/numLots))}

EXIT STRATEGY 2 - Seller Financed:
Price/lot: ${fmt(d.lotArvSF)} | ${d.sfDownPct}% down, ${d.sfRate}% rate, ${d.sfTermYrs}yr
Monthly cash flow (all lots): ${fmt(Math.round(sf_pmtLot*numLots))} | Total collected: ${fmt(Math.round(sf_totalRev))} | Net: ${fmt(Math.round(sf_net))}

EXIT STRATEGY 3 - Mobile Home Package:
ARV/lot: ${fmt(d.lotArvMH)} | Home: ${fmt(d.mhHomeCost)} | Setup: ${fmt(d.mhSetupCost)}
Revenue: ${fmt(mh_rev)} | Total cost: ${fmt(mh_totalCost)} | Net: ${fmt(mh_net)}

Best exit: ${[{n:'Traditional',v:t_net},{n:'Seller Finance',v:Math.round(sf_net)},{n:'MH Package',v:mh_net}].sort((a,b)=>b.v-a.v)[0].n}`;
  }

  // Show loading modal
  showMemoModal('Generating deal memo...','<div style="text-align:center;padding:2rem;color:var(--text-3)"><div style="font-size:0.85rem;margin-bottom:0.5rem">Analyzing deal...</div><div style="font-size:0.72rem">Powered by Claude AI</div></div>');

  // Call Anthropic API
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:`You are a real estate investment analyst writing a concise deal memo for Range Land Group, a Texas-based land and manufactured home company. Write a professional 1-page deal memo based on this data. Include: Executive Summary (2-3 sentences), Key Numbers (bullet the critical metrics), Risk Factors (2-3 specific risks based on the numbers), Recommendation (clear go/no-go with reasoning). Keep it sharp, direct, no fluff. Use dollar amounts and percentages. Address it as an internal memo.\n\n${dealData}`}]
    })
  })
  .then(r=>r.json())
  .then(data=>{
    const text=data.content?.map(b=>b.text||'').join('\n')||'Error: No response received.';
    const html=text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/^## (.*?)(<br>)/gm,'<h3 style="font-size:0.85rem;font-weight:700;margin:1rem 0 0.3rem;color:var(--text)">$1</h3>').replace(/^# (.*?)(<br>)/gm,'<h2 style="font-size:1rem;font-weight:700;margin:0.5rem 0;color:var(--text)">$1</h2>').replace(/- (.*?)(<br>)/g,'<div style="padding-left:1rem;margin:0.15rem 0">• $1</div>');
    showMemoModal('AI Deal Memo',`<div style="font-size:0.8rem;line-height:1.65;color:var(--text-2)">${html}</div>`);
  })
  .catch(err=>{
    showMemoModal('Error',`<div style="color:var(--red);font-size:0.82rem">Failed to generate memo. ${err.message||'Check your connection.'}</div>`);
  });
}

function showMemoModal(title,content){
  // Remove existing modal
  const existing=document.getElementById('memo-modal');
  if(existing)existing.remove();

  const modal=document.createElement('div');
  modal.id='memo-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)';
  modal.innerHTML=`
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:14px;max-width:600px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.4rem;border-bottom:1px solid var(--border);flex-shrink:0">
        <div style="display:flex;align-items:center;gap:0.6rem">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></div>
          <span style="font-size:0.82rem;font-weight:600;color:var(--text)">${title}</span>
        </div>
        <div style="display:flex;gap:0.4rem">
          <button onclick="copyMemo()" style="font-size:0.68rem;font-family:'Inter',sans-serif;padding:0.35rem 0.75rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);min-height:32px;cursor:pointer">Copy</button>
          <button onclick="document.getElementById('memo-modal').remove()" style="font-size:0.68rem;font-family:'Inter',sans-serif;padding:0.35rem 0.75rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-3);min-height:32px;cursor:pointer">Close</button>
        </div>
      </div>
      <div id="memo-content" style="padding:1.4rem;overflow-y:auto;-webkit-overflow-scrolling:touch">${content}</div>
    </div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
  document.body.appendChild(modal);
}

function copyMemo(){
  const el=document.getElementById('memo-content');
  if(!el)return;
  const text=el.innerText||el.textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('#memo-modal button');
    if(btn){btn.textContent='Copied ✓';setTimeout(()=>btn.textContent='Copy',1500);}
  });
}

  return`<div class="field"><div class="field-lbl">${label}</div>

      <input class="field-inp" type="tel" inputmode="numeric" value="${val}"

function sl(key,lbl){
  return`<div class="sl"><span class="sl-lbl">${lbl}</span>

function cr(label,value,indent,bold){
  const neg=String(value).startsWith("-");
  const isZero=value==="$0";
  if(isZero&&indent&&!bold)return"";
  return`<div class="cs-row${indent?" in":""}${bold?" b":""}${neg?" neg":""}" ${isZero&&!bold?'style="opacity:0.35"':""}>
    <span class="cs-lbl">${label}</span><span class="cs-val">${value}</span>
  </div>`;
}

  <div class="indicator" style="background:${good?"#f0fdf4":warn?"#fffbeb":"#fef2f2"};border:1px solid ${good?"#bbf7d0":warn?"#fde68a":"#fecaca"}">
    <div class="dot" style="background:${pc}"></div>
    <div class="ind-lbl" style="color:${pc}">${il}</div>
  </div>

  <div class="meta">
    <div class="meta-item"><div class="meta-lbl">Net Profit</div><div class="meta-val" style="color:${pc}">${fmt(c.net)}</div></div>
    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">Margin</div><div class="meta-val">${fmtP(c.margin)}</div></div>
    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">ROI</div><div class="meta-val">${fmtP(c.roi)}</div></div>
    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">CoC Return</div><div class="meta-val">${c.coc!==null?fmtP(c.coc):"—"}</div></div>
    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">Cash to Close</div><div class="meta-val">${fmt(c.cashToClose)}</div></div>
  </div>

  ${c.sqft?`<div style="text-align:center;font-size:12px;color:#666;margin:-12px 0 20px;font-family:'Courier New',monospace">$${c.priceSqft}/sqft sale · $${c.costSqft}/sqft cost · ${c.sqft.toLocaleString()} sqft home</div>`:""}

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px">
    <div style="padding:12px;background:#f8f8f8;border-radius:6px;text-align:center">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999">LTV</div>
      <div style="font-size:20px;font-family:'Courier New',monospace;font-weight:600;color:${ltvCol};margin-top:4px">${fmtP(c.ltv)}</div>
      <div style="font-size:10px;color:${ltvCol};margin-top:2px">Loan-to-Value · ${ltvLabel}</div>
    </div>
    <div style="padding:12px;background:#f8f8f8;border-radius:6px;text-align:center">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999">Break-Even</div>
      <div style="font-size:20px;font-family:'Courier New',monospace;font-weight:600;color:#111;margin-top:4px">${fmt(c.breakEven)}</div>
      <div style="font-size:10px;color:#666;margin-top:2px">${fmt(S.salePrice-c.breakEven)} cushion to ARV</div>
    </div>
    <div style="padding:12px;background:#f8f8f8;border-radius:6px;text-align:center">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999">Cash-on-Cash</div>
      <div style="font-size:20px;font-family:'Courier New',monospace;font-weight:600;color:#111;margin-top:4px">${c.coc!==null?fmtP(c.coc):"—"}</div>
      <div style="font-size:10px;color:#666;margin-top:2px">${fmt(c.cashToClose)} cash deployed</div>
    </div>
  </div>

  <div class="two-col">
  <div>
    <h2>Hard Costs</h2>
    <table>
      ${row("Lot / Land",fmt(S.lotCost),true)}
      ${row(`Home — ${modelName}`,fmt(c.hc),true)}
      <tr><td colspan="2" style="padding:6px 8px;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#aaa">Site Work</td></tr>
      ${row("House Pad",fmt(S.setup.housePad),true)}
      ${row("Driveway Base",fmt(S.setup.driveway),true)}
      ${row("Culvert",fmt(S.setup.culvert),true)}
      ${row("Final Grade",fmt(S.setup.grading),true)}
      <tr><td colspan="2" style="padding:6px 8px;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#aaa">Utilities</td></tr>
      ${row("Septic System",fmt(S.setup.septic),true)}
      ${row("Plumbing to Septic",fmt(S.setup.plumbing),true)}
      ${row("Water Line",fmt(S.setup.waterLine),true)}
      ${row("Electric (Underground)",fmt(S.setup.electric),true)}
      ${row("Electrical Post",fmt(S.setup.electricPost),true)}
      <tr><td colspan="2" style="padding:6px 8px;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#aaa">Home Setup</td></tr>
      ${row("Set & Level",fmt(S.setup.setLevel),true)}
      ${row("Interior Trim",fmt(c.effectiveTrim)+(c.isClayton?" (auto-adjusted)":""),true)}
      ${row("FHA Retrofit",fmt(S.setup.fhaRetrofit),true)}
      ${row("Skirting",fmt(S.setup.skirting),true)}
      ${row("Decks",fmt(S.setup.decks),true)}
      ${row("HVAC",fmt(S.setup.hvac),true)}
      ${S.setup.demo?row("Demo / Teardown",fmt(S.setup.demo),true):""}
      ${S.setup.custom1?row(S.c1lbl,fmt(S.setup.custom1),true):""}
      ${S.setup.custom2?row(S.c2lbl,fmt(S.setup.custom2),true):""}
      ${row("Contingency / Buffer",fmt(S.setup.contingency),true)}
      ${row("Total Hard Cost",fmt(c.hard),false,true)}
      ${c.sqft?row("Cost per Sqft","$"+c.costSqft+"/sqft · "+c.sqft.toLocaleString()+" sf",true):""}
    </table>
  </div>

  <div>
    <h2>Financing</h2>
    <table>
      ${S.financed?`
      ${row("Hard Cost (Loan Basis)",fmt(c.hard),true)}
      ${row(`LTC % (Lender covers)`,S.ltcPct+"% → "+fmt(c.loanByLTC),true)}
      ${row(`LTV Cap (Max of ARV)`,S.ltvCapPct+"% → "+fmt(c.loanByLTV),true)}
      ${row(`Loan Amount (MIN of above)`,fmt(c.loanAmt),false,true)}
      ${row(`Interest Rate`,S.interestRate+"%",true)}
      ${row(`Origination Points`,S.originationPts+" pts",true)}
      ${row(`Loan Term`,S.loanMonths+" months",true)}
      ${row(`Origination Fee`,fmt(c.orig),true)}
      ${row(`Interest (${S.loanMonths} mo @ ${S.interestRate}%)`,fmt(c.intr),true)}
      ${row("Total Financing",fmt(c.tfin),false,true)}`
      :row("Cash Deal — No Financing","$0",false,true)}
    </table>

    <h2>Est. Cash to Close</h2>
    <table>
      ${S.financed?`
      ${row("Hard Cost",fmt(c.hard),true)}
      ${row("Less: Loan Amount","− "+fmt(c.loanAmt),true)}
      ${row("Down Payment",fmt(c.downPayment),false,true)}
      ${row("Origination Fee",fmt(c.orig),true)}`
      :`${row("Hard Cost (full cash)",fmt(c.hard),true)}`}
      ${row("Buy-Side Title (0.5% of lot)",fmt(c.buyTitle),true)}
      ${row("Survey",fmt(S.surveyAmount),true)}
      ${row("Est. Cash to Close",fmt(c.cashToClose),false,true)}
    </table>

    <h2>Holding Costs</h2>
    <table>
      ${row(`Property Taxes (${S.taxRate}% · ${S.loanMonths}mo)`,fmt(c.propTax),true)}
      ${S.holding.insurance?row("Insurance",fmt(S.holding.insurance),true):""}
      ${S.holding.maintenance?row("Maintenance",fmt(S.holding.maintenance),true):""}
      ${S.holding.hoa?row("HOA / POA",fmt(S.holding.hoa),true):""}
      ${S.holding.utilities?row("Utilities",fmt(S.holding.utilities),true):""}
      ${S.holding.custom?row(S.hcLbl,fmt(S.holding.custom),true):""}
      ${row("Total Holding",fmt(c.ht),false,true)}
    </table>

    <h2>Selling Costs</h2>
    <table>
      ${row(`Commission (${S.commPct*100}%)`,fmt(c.comm),true)}
      ${row("Sale Title Fees (1%)",fmt(c.sellTitle),true)}
      ${S.sellerCredit?row("Seller Credit to Buyer",fmt(S.sellerCredit),true):""}
      ${row("Total Selling",fmt(c.tsell),false,true)}
    </table>

    <h2>Summary</h2>
    <table>
      ${row("Sale Price / ARV",fmt(S.salePrice),false,true)}
      ${c.sqft?row("Price per Sqft","$"+c.priceSqft+"/sqft",true):""}
      ${row("Total Hard Cost",fmt(c.hard),true)}
      ${row("Total Financing",fmt(c.tfin),true)}
      ${row("Total Holding",fmt(c.ht),true)}
      ${row("Total Selling",fmt(c.tsell),true)}
      ${row("Total All-In",fmt(c.total),false,true)}
      ${row("LTV (Loan / ARV)",fmtP(c.ltv)+" — "+ltvLabel,true)}
      ${row("Break-Even Sale Price",fmt(c.breakEven),true)}
      ${row("Est. Cash to Close",fmt(c.cashToClose),true)}
    </table>
    <div class="net-row"><span class="net-lbl">Net Profit</span><span class="net-val">${fmt(c.net)}</span></div>
  </div>
  </div>

  <div class="footer">
    <span>Range Land Group · Emerton Homes · Confidential</span>
    <span>Generated ${today}</span>
  </div>

  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`);
  win.document.close();
}

function saveDeal(){
  const snap=JSON.parse(JSON.stringify(S));
  const name=S.dealName||(S.dealAddress?S.dealAddress.split(',')[0]:('Deal '+(S.savedDeals.length+1)));
  snap.name=name;
  snap.dealType=S.mode==='subdivide'?'land':'home';
  snap.savedAt=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
  if(!S.savedDeals)S.savedDeals=[];
  S.savedDeals.push(snap);
  saveState();render();
  // Toast
  const t=document.createElement('div');
  t.textContent='✓ Saved: '+name;
  t.style.cssText='position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:0.7rem 1.4rem;border-radius:8px;font-size:0.82rem;font-family:Inter,sans-serif;font-weight:500;z-index:999;animation:fadeup 0.3s ease';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}
function deleteDeal(idx){
  if(!confirm('Delete "'+S.savedDeals[idx].name+'"?'))return;
  S.savedDeals.splice(idx,1);
  saveState();render();
}
function loadDeal(idx){
  const snap=S.savedDeals[parseInt(idx)];
  if(!snap)return;
  const saved=S.savedDeals;
  Object.assign(S,snap);
  S.savedDeals=saved;
  if(snap.dealType==='land')S.mode='subdivide';
  saveState();render();
  // Close manager if open
  const m=document.getElementById('deal-manager');if(m)m.remove();
}

function showDealManager(){
  const existing=document.getElementById('deal-manager');
  if(existing){existing.remove();return;}

  const deals=S.savedDeals||[];
  const modal=document.createElement('div');
  modal.id='deal-manager';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:3rem 1rem;backdrop-filter:blur(4px);overflow-y:auto;-webkit-overflow-scrolling:touch';

  let list='';
  if(deals.length===0){
    list='<div style="text-align:center;padding:2rem;color:var(--text-3);font-size:0.82rem">No saved deals yet. Use the <strong>Save</strong> button to save your current deal.</div>';
  } else {
    list=deals.map((d,i)=>{
      const icon=d.dealType==='land'?'🏗':'🏠';
      const name=d.name||'Deal '+(i+1);
      const net=d.dealType==='land'?'':''; // We show date instead
      return`<div style="display:flex;align-items:center;gap:0.8rem;padding:0.85rem 1rem;border-bottom:1px solid var(--border);${i===0?'border-top:1px solid var(--border)':''}">
        <div style="font-size:1.2rem;flex-shrink:0">${icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.82rem;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</div>
          <div style="font-size:0.62rem;color:var(--text-3);margin-top:0.15rem">${d.dealType==='land'?'Subdivision':'Home + Land'}${d.savedAt?' · Saved '+d.savedAt:''}</div>
        </div>
        <div style="display:flex;gap:0.3rem;flex-shrink:0">
          <button onclick="loadDeal(${i})" style="font-size:0.62rem;font-family:'Inter',sans-serif;padding:0.3rem 0.6rem;border-radius:5px;border:none;background:var(--accent);color:#fff;min-height:30px;cursor:pointer;font-weight:600">Load</button>
          <button onclick="renameDeal(${i})" style="font-size:0.62rem;font-family:'Inter',sans-serif;padding:0.3rem 0.5rem;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);min-height:30px;cursor:pointer" title="Rename">✏️</button>
          <button onclick="duplicateDeal(${i})" style="font-size:0.62rem;font-family:'Inter',sans-serif;padding:0.3rem 0.5rem;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);min-height:30px;cursor:pointer" title="Duplicate">📋</button>
          <button onclick="deleteDealFromManager(${i})" style="font-size:0.62rem;font-family:'Inter',sans-serif;padding:0.3rem 0.5rem;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--red);min-height:30px;cursor:pointer" title="Delete">🗑</button>
        </div>
      </div>`;
    }).join('');
  }

  modal.innerHTML=`
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:14px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.4rem;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:0.88rem;font-weight:600;color:var(--text)">Saved Deals</div>
          <div style="font-size:0.62rem;color:var(--text-3);margin-top:0.15rem">${deals.length} deal${deals.length!==1?'s':''} saved</div>
        </div>
        <button onclick="document.getElementById('deal-manager').remove()" style="font-size:0.72rem;font-family:'Inter',sans-serif;padding:0.35rem 0.75rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-3);min-height:32px;cursor:pointer">Close</button>
      </div>
      <div style="max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch">
        ${list}
      </div>
      ${deals.length>0?`<div style="padding:1rem 1.4rem;border-top:1px solid var(--border)">
        <button onclick="if(confirm('Delete ALL saved deals? This cannot be undone.')){S.savedDeals=[];saveState();render();document.getElementById('deal-manager').remove()}" style="width:100%;font-size:0.72rem;font-family:'Inter',sans-serif;padding:0.5rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--red);min-height:36px;cursor:pointer">Clear All Saved Deals</button>
      </div>`:""}
    </div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
  document.body.appendChild(modal);
}

function renameDeal(idx){
  const deal=S.savedDeals[idx];
  const newName=prompt('Rename deal:',deal.name||'Deal '+(idx+1));
  if(newName===null)return;
  deal.name=newName.trim()||deal.name;
  saveState();
  // Refresh manager
  document.getElementById('deal-manager').remove();
  showDealManager();
}

function duplicateDeal(idx){
  const copy=JSON.parse(JSON.stringify(S.savedDeals[idx]));
  copy.name=(copy.name||'Deal')+ ' (copy)';
  copy.savedAt=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
  S.savedDeals.push(copy);
  saveState();
  document.getElementById('deal-manager').remove();
  showDealManager();
}

function deleteDealFromManager(idx){
  const name=S.savedDeals[idx].name||'Deal '+(idx+1);
  if(!confirm('Delete "'+name+'"?'))return;
  S.savedDeals.splice(idx,1);
  saveState();render();
  document.getElementById('deal-manager').remove();
  if(S.savedDeals.length>0)showDealManager();
}

render();
</script>
</body>
</html>
