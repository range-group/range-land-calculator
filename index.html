  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #f8f8f8; color: #111; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; font-family: 'Inter', sans-serif; }
    input, select { font-family: 'JetBrains Mono', 'Courier New', monospace; color: #111; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    :root {
      --bg: #f8f8f8;
      --surface: #ffffff;
      --surface-2: #f4f4f5;
      --border: #e4e4e7;
      --border-strong: #d4d4d8;
      --text: #111111;
      --text-2: #52525b;
      --text-3: #a1a1aa;
      --accent: #1a56db;
      --accent-light: #eff4ff;
      --accent-border: #bfcffa;
      --green: #16a34a;
      --amber: #b45309;
      --red: #dc2626;
      --mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    .app { min-height: 100vh; padding: 3rem 1.5rem 6rem; background: var(--bg); }
    .inner { max-width: 880px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    .hdr { margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .hdr-badge { font-size: 0.7rem; font-family: var(--mono); background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); border-radius: 5px; padding: 0.3rem 0.7rem; font-weight: 500; }

    .section { margin-bottom: 1.8rem; }
    .sec-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.85rem; display: flex; align-items: center; gap: 0.6rem; }
    .sec-label::after { content:''; flex:1; height:1px; background: var(--border); }
    .sub-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-3); margin: 0.9rem 0 0.5rem; }

    .model-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 0.9rem; color: var(--text-2); font-size: 0.85rem; font-weight: 400; margin-bottom: 0.4rem; transition: all 0.12s; text-align: left; }
    .model-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .model-btn.active { background: var(--accent-light); border-color: var(--accent); border-width: 1.5px; color: var(--text); }
    .model-price { font-family: var(--mono); font-size: 0.8rem; color: var(--text-3); }
    .model-btn.active .model-price { color: var(--accent); font-weight: 500; }

    .tg { display: grid; gap: 0.35rem; }
    .tg-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 0.5rem 0.3rem; color: var(--text-3); font-size: 0.8rem; font-weight: 400; transition: all 0.12s; }
    .tg-btn:hover { border-color: var(--border-strong); color: var(--text-2); }
    .tg-btn.active { background: var(--accent-light); border-color: var(--accent); border-width: 1.5px; color: var(--accent); font-weight: 600; }

    .field { margin-bottom: 0.9rem; }
    .field-lbl { font-size: 0.7rem; font-weight: 500; color: var(--text-2); margin-bottom: 0.35rem; letter-spacing: 0.01em; }
    .field-row { position: relative; }
    .field-pre { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-3); font-family: var(--mono); font-size: 0.85rem; pointer-events: none; }
    .field-inp { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.75rem 0.65rem 1.7rem; color: var(--text); font-family: var(--mono); font-size: 0.88rem; outline: none; transition: border-color 0.15s, box-shadow 0.15s; -webkit-appearance: none; }
    .field-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }

    .sl { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.38rem; }
    .sl-lbl { flex: 1; font-size: 0.8rem; color: var(--text-3); }
    .sl-lbl-inp { flex: 1; background: transparent; border: 1px solid transparent; border-radius: 4px; padding: 0.25rem 0.4rem; color: var(--text-3); font-size: 0.78rem; outline: none; font-family: 'Inter', sans-serif; }
    .sl-lbl-inp:focus { border-color: var(--border); background: var(--surface); }
    .sl-wrap { position: relative; width: 90px; flex-shrink: 0; }
    .sl-pre { position: absolute; left: 0.5rem; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 0.72rem; pointer-events: none; font-family: var(--mono); }
    .sl-inp { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.32rem 0.4rem 0.32rem 1.1rem; color: var(--text); font-family: var(--mono); font-size: 0.78rem; outline: none; -webkit-appearance: none; }
    .sl-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(26,86,219,0.1); }
    .sl-total { display: flex; justify-content: space-between; padding-top: 0.65rem; margin-top: 0.4rem; border-top: 1px solid var(--border); }
    .sl-total-lbl { font-size: 0.83rem; font-weight: 600; color: var(--text); }
    .sl-total-val { font-family: var(--mono); font-size: 0.88rem; font-weight: 600; color: var(--text); }

    .indicator { display: flex; align-items: center; gap: 0.9rem; padding: 1rem 1.1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; }
    .ind-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .ind-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
    .ind-sub { font-size: 0.68rem; color: var(--text-3); margin-top: 0.15rem; }

    .profit-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem 1.2rem 1.4rem; margin-bottom: 1.5rem; text-align: center; }
    .profit-lbl { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.6rem; }
    .profit-val { font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 300; letter-spacing: -0.04em; line-height: 1; font-family: 'Inter', sans-serif; }
    .profit-meta { display: flex; justify-content: center; gap: 0; margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .meta-item { flex: 1; text-align: center; border-right: 1px solid var(--border); }
    .meta-item:last-child { border-right: none; }
    .meta-lbl { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }
    .meta-val { font-size: 1rem; font-family: var(--mono); color: var(--text); margin-top: 0.25rem; font-weight: 500; }

    .cs-row { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; }
    .cs-lbl { font-size: 0.8rem; color: var(--text-2); }
    .cs-val { font-family: var(--mono); font-size: 0.8rem; color: var(--text-2); }
    .cs-row.in { padding-left: 0.9rem; }
    .cs-row.in .cs-lbl { font-size: 0.76rem; color: var(--text-3); }
    .cs-row.in .cs-val { font-size: 0.76rem; color: var(--text-3); }
    .cs-row.b .cs-lbl { font-weight: 600; color: var(--text); font-size: 0.84rem; }
    .cs-row.b .cs-val { font-weight: 600; color: var(--text); font-size: 0.84rem; }
    .cs-row.neg .cs-val { color: var(--red); }
    .cs-div { height: 1px; background: var(--border); margin: 0.5rem 0; }
    .cs-cat { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin: 0.7rem 0 0.25rem; }
    .cs-net { display: flex; justify-content: space-between; padding: 0.6rem 0; margin-top: 0.25rem; border-top: 2px solid var(--text); }
    .cs-net-lbl { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .cs-net-val { font-family: var(--mono); font-size: 0.9rem; font-weight: 700; }

    .sens-row { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.55rem; }
    .sens-lbl { font-family: var(--mono); font-size: 0.66rem; width: 3.2rem; flex-shrink: 0; color: var(--text-3); }
    .sens-lbl.a { color: var(--accent); font-weight: 600; }
    .sens-track { flex: 1; height: 4px; background: var(--surface-2); border-radius: 3px; }
    .sens-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .sens-val { font-family: var(--mono); font-size: 0.72rem; width: 5.5rem; text-align: right; flex-shrink: 0; color: var(--text-3); }
    .sens-val.a { font-weight: 600; }

    .inline-row { display: flex; justify-content: space-between; align-items: center; padding: 0.32rem 0; border-bottom: 1px solid var(--border); }
    .inline-row:last-child { border-bottom: none; }
    .inline-lbl { font-size: 0.78rem; color: var(--text-3); }
    .inline-val { font-family: var(--mono); font-size: 0.78rem; color: var(--text-2); }

    /* ── COMPARE MODE ── */
    .cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 640px) { .cmp-grid { grid-template-columns: 1fr; } }
    .cmp-col { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; }
    .cmp-col.winner { border-color: var(--green); border-width: 2px; }
    .cmp-row { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
    .cmp-row:last-child { border-bottom: none; }
    .cmp-lbl { font-size: 0.72rem; color: var(--text-3); }
    .cmp-val { font-family: var(--mono); font-size: 0.72rem; color: var(--text); font-weight: 500; }
    @keyframes fadeup { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    /* Zero-value dimming */
    .inline-row .zv, .cs-row .zv { opacity: 0.35; }
  </style>
</head>

<div id="app"></div>
<script>
const DEFAULT_MODELS=[
  {name:"TRU Redwood",            cost:73000, sqft:2001, claytonTrim:false},
  {name:"TRU Sycamore",           cost:68000, sqft:1790, claytonTrim:false},
  {name:"TRU Oak",                cost:57000, sqft:1475, claytonTrim:false},
  {name:"Clayton Haven",          cost:71000, sqft:1580, claytonTrim:true},
  {name:"Clayton Solace",         cost:79000, sqft:1790, claytonTrim:true},
  {name:"Clayton Choice",         cost:88000, sqft:1896, claytonTrim:true},
  {name:"Clayton Absolute Value", cost:93000, sqft:2001, claytonTrim:true},
  {name:"Custom / Other",         cost:0,     sqft:0,    claytonTrim:false},
];
const DEFAULTS={
  homeIdx:1,customHome:73000,customHomeName:"Custom Model",
  modelCosts:[73000,68000,57000,71000,79000,88000,93000,0],
  dealName:"",dealAddress:"",notes:"",
  lotCost:70000,salePrice:260000,loanMonths:5,commPct:0.06,sellerCredit:0,
  financed:true, ltcPct:90,ltvCapPct:70,surveyAmount:650,
  interestRate:12,originationPts:2.5,
  setup:{housePad:2000,driveway:1200,culvert:700,grading:1200,septic:8500,plumbing:400,waterLine:700,electric:2200,electricPost:2000,setLevel:7250,trimUpgrade:3300,fhaRetrofit:3000,skirting:3000,decks:3000,hvac:4000,demo:0,custom1:0,custom2:0,contingency:2500},
  c1lbl:"Custom Item 1",c2lbl:"Custom Item 2",
  taxRate:1.85,
  holding:{insurance:1200,maintenance:500,hoa:0,utilities:500,custom:0},hcLbl:"Other",
  // Quick mode
  quickAcres:1,quickArvOverride:false,quickTargetProfit:45000,quickCostsOpen:false,
  // Compare mode
  compareA:0,compareB:3,
  // Buyer mortgage
  buyerDownPct:10,buyerRate:7,buyerTerm:30,buyerInsAnnual:1800,buyerPmiRate:0.75,
  // Subdivision
  sub:{
    landPrice:0,totalFrontage:0,ftPerLot:150,
    financed:true,interestRate:12,originationPts:2.5,ltcPct:65,loanMonths:12,
    waterMeterCost:15000,numMetersOverride:0,miscWaterCost:0,
    electricPerLot:1500,surveyCost:0,roadCost:0,attorneyFees:0,filingFees:500,
    custom1:0,custom2:0,c1lbl:"Custom Item 1",c2lbl:"Custom Item 2",
    buyClosingOverride:0,
    holdInsurance:0,holdTaxRate:1.85,holdMaint:0,
    agExemption:false,agValue:0,marketValue:0,rollbackYears:3,rollbackInterest:7,
    exitView:"compare",commPct:0.06,
    lotArvTrad:0,
    lotArvSF:0,sfDownPct:10,sfRate:10,sfTermYrs:10,
    lotArvMH:0,mhHomeCost:68000,mhSetupCost:45000
  }
};

function loadState(){
  try{const s=localStorage.getItem("rlg_calc_v1");
    if(s){const p=JSON.parse(s);
      const d=JSON.parse(JSON.stringify(DEFAULTS));
      d.setup={...d.setup,...(p.setup||{})};
      d.holding={...d.holding,...(p.holding||{})};
      d.sub={...d.sub,...(p.sub||{})};
      return{...d,...p,setup:d.setup,holding:d.holding,sub:d.sub};
    }
    return JSON.parse(JSON.stringify(DEFAULTS));
  }catch{return JSON.parse(JSON.stringify(DEFAULTS));}
}
function saveState(){try{localStorage.setItem("rlg_calc_v1",JSON.stringify(S));}catch{}}
function resetState(){
  const saved=S.savedDeals||[];
  Object.assign(S,JSON.parse(JSON.stringify(DEFAULTS)));
  S.mode=S.mode||"full";S.savedDeals=saved;
  saveState();render();
}
const S=loadState();
// Migrate: reset sub if old fields detected or new ones missing
if(S.sub && (S.sub.filingFees===undefined || S.sub.legalCost!==undefined || S.sub.electricTotal!==undefined || S.sub.buyClosing!==undefined || S.sub.agExemption===undefined)){
  S.sub=JSON.parse(JSON.stringify(DEFAULTS.sub));
}
if(!S.mode)S.mode="full";
if(!S.savedDeals)S.savedDeals=[];
if(!S.notes)S.notes="";
if(S.quickAcres===undefined)S.quickAcres=1;
if(S.quickArvOverride===undefined)S.quickArvOverride=false;
if(S.quickTargetProfit===undefined)S.quickTargetProfit=45000;
if(S.quickCostsOpen===undefined)S.quickCostsOpen=false;
if(S.compareA===undefined)S.compareA=0;
if(S.compareB===undefined)S.compareB=3;
if(S.buyerDownPct===undefined)S.buyerDownPct=10;
if(S.buyerRate===undefined)S.buyerRate=7;
if(S.buyerTerm===undefined)S.buyerTerm=30;
if(S.buyerInsAnnual===undefined)S.buyerInsAnnual=1800;
if(S.buyerPmiRate===undefined)S.buyerPmiRate=0.75;

const BUY_TITLE=0.005,SELL_TITLE=0.01,MINP=35000;
const fmt=n=>n<0?`-$${Math.abs(Math.round(n)).toLocaleString()}`:`$${Math.round(n).toLocaleString()}`;
const fmtP=n=>`${(n*100).toFixed(1)}%`;
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

// ── CORE RECALC (uses current S state) ──
function recalc(){return recalcFor(S.homeIdx);}

// ── RECALC FOR ANY MODEL INDEX (reuses same deal variables) ──
function recalcFor(idx){
  const hc = idx===DEFAULT_MODELS.length-1 ? S.customHome : S.modelCosts[idx];
  const modelName = idx===DEFAULT_MODELS.length-1 ? S.customHomeName : DEFAULT_MODELS[idx].name;
  const isClayton = DEFAULT_MODELS[idx]?.claytonTrim === true;
  const sqft = DEFAULT_MODELS[idx]?.sqft || 0;
  const effectiveTrim = isClayton ? 1600 : S.setup.trimUpgrade;
  const st = Object.values(S.setup).reduce((a,b)=>a+b, 0) - S.setup.trimUpgrade + effectiveTrim;
  const hard = S.lotCost + hc + st;
  const propTax = Math.round(hard * (S.taxRate/100) * (S.loanMonths/12));
  const ht = propTax + Object.values(S.holding).reduce((a,b)=>a+b, 0);
  const buyTitle = Math.round(S.lotCost * BUY_TITLE);
  const buyClosing = buyTitle + S.surveyAmount;
  let loanAmt=0,loanByLTC=0,loanByLTV=0,ltc=0,ltv=0,orig=0,intr=0,tfin=0;
  let downPayment=hard,cashToClose=hard+buyClosing;
  if(S.financed){
    loanByLTC=Math.round(hard*(S.ltcPct/100));
    loanByLTV=Math.round(S.salePrice*(S.ltvCapPct/100));
    loanAmt=Math.min(loanByLTC,loanByLTV);
    ltc=loanAmt/hard;ltv=loanAmt/S.salePrice;
    orig=loanAmt*(S.originationPts/100);
    intr=(loanAmt*(S.interestRate/100)/12)*S.loanMonths;
    tfin=orig+intr;
    downPayment=hard-loanAmt;
    cashToClose=downPayment+orig+buyClosing;
  }
  const comm=S.salePrice*S.commPct;
  const sellTitle=Math.round(S.salePrice*SELL_TITLE);
  const tsell=comm+sellTitle+S.sellerCredit;
  const total=hard+tfin+ht+tsell;
  const net=S.salePrice-total;
  const roi=hard>0?net/hard:0;
  const margin=S.salePrice>0?net/S.salePrice:0;
  const coc=cashToClose>0?net/cashToClose:null;
  const breakEven=Math.ceil((hard+tfin+ht+S.sellerCredit)/(1-S.commPct-SELL_TITLE));
  // $/sqft metrics
  const priceSqft=sqft>0?Math.round(S.salePrice/sqft):0;
  const costSqft=sqft>0?Math.round(hard/sqft):0;
  return{hc,modelName,st,ht,hard,loanAmt,loanByLTC,loanByLTV,ltc,ltv,
    orig,intr,tfin,comm,sellTitle,tsell,total,net,downPayment,cashToClose,
    buyTitle,buyClosing,roi,margin,propTax,breakEven,coc,effectiveTrim,isClayton,
    sqft,priceSqft,costSqft};
}

function render(){document.getElementById("app").innerHTML=buildApp();}

    ${S.financed?`
    <div class="section">
      <div class="sec-label">Profit vs. Loan Term</div>
      ${[3,4,5,6,7,8].map(mo=>{
        const itr=(c.loanAmt*(S.interestRate/100)/12)*mo;
        const fin=c.orig+itr;const net=S.salePrice-c.hard-fin-c.ht-c.tsell;
        const base=S.salePrice-c.hard-(c.orig+(c.loanAmt*(S.interestRate/100)/12)*3)-c.ht-c.tsell;
        const w=Math.max(3,Math.min(100,base>0?(net/base)*100:4));
        const fc=net>=MINP?"#16a34a":net>=0?"#b45309":"#dc2626";const a=mo===S.loanMonths;
        return`<div class="sens-row"><span class="sens-lbl${a?" a":""}">${mo}mo</span><div class="sens-track"><div class="sens-fill" style="width:${w}%;background:${a?fc:"#d4d4d8"}"></div></div><span class="sens-val${a?" a":""}" style="color:${a?fc:"var(--text-3)"}">${fmt(net)}</span></div>`;
      }).join("")}
    </div>`:""}

    <div class="section">
      <div class="sec-label">Profit vs. Sale Price</div>
      ${[-20000,-10000,0,10000,20000].map(d=>{
        const sp=S.salePrice+d;const net=sp-c.hard-c.tfin-c.ht-(sp*S.commPct+sp*SELL_TITLE+S.sellerCredit);
        const base=(S.salePrice+20000)-c.hard-c.tfin-c.ht-((S.salePrice+20000)*S.commPct+(S.salePrice+20000)*SELL_TITLE+S.sellerCredit);
        const w=Math.max(3,Math.min(100,base>0?(net/base)*100:4));
        const fc=net>=MINP?"#16a34a":net>=0?"#b45309":"#dc2626";const a=d===0;
        return`<div class="sens-row"><span class="sens-lbl${a?" a":""}">${d===0?"Base":d>0?"+"+d/1000+"k":d/1000+"k"}</span><div class="sens-track"><div class="sens-fill" style="width:${w}%;background:${a?fc:"#d4d4d8"}"></div></div><span class="sens-val${a?" a":""}" style="color:${a?fc:"var(--text-3)"}">${fmt(net)}</span></div>`;
      }).join("")}
    </div>

    <div class="section">
      <div class="sec-label">Profit by Home Model</div>
      <div style="font-size:0.68rem;color:var(--text-3);margin-bottom:0.9rem">Same lot · same variables · swap home only</div>
      ${(()=>{
        const results=DEFAULT_MODELS.filter(m=>m.cost>0).map(m=>{
          const idx=DEFAULT_MODELS.indexOf(m);
          const r=recalcFor(idx);
          return{name:m.name,cost:S.modelCosts[idx],net:r.net,isCurrent:idx===S.homeIdx,sqft:m.sqft,priceSqft:r.priceSqft};
        }).sort((a,b)=>b.net-a.net);
        const maxNet=Math.max(...results.map(r=>r.net));
        const minNet=Math.min(...results.map(r=>r.net));
        const range=maxNet-minNet||1;
        return results.map((r,i)=>{

                ${i===0&&!r.isCurrent?`<span style="font-size:0.55rem;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:3px;padding:0.08rem 0.35rem;font-family:var(--mono);font-weight:600">BEST</span>`:""}

                <span style="font-family:var(--mono);font-size:0.78rem;font-weight:600;color:${fc};min-width:5rem;text-align:right">${fmt(r.net)}</span>

            </div>

/* ═══════════════════════════════════════════
   QUICK MODE — linked to full mode state
   ═══════════════════════════════════════════ */
function buildQuickMode(c,pc,dc,dg,il){
  const ARV_ANCHORS=[{ac:1,arv:255000},{ac:2,arv:270000},{ac:3,arv:310000},{ac:4,arv:375000},{ac:5,arv:400000}];
  function autoARV(acres){
    if(acres<=ARV_ANCHORS[0].ac)return ARV_ANCHORS[0].arv;
    if(acres>=ARV_ANCHORS[ARV_ANCHORS.length-1].ac)return ARV_ANCHORS[ARV_ANCHORS.length-1].arv;
    for(let i=0;i<ARV_ANCHORS.length-1;i++){
      const a=ARV_ANCHORS[i],b=ARV_ANCHORS[i+1];
      if(acres>=a.ac&&acres<=b.ac){const t=(acres-a.ac)/(b.ac-a.ac);return Math.round((a.arv+t*(b.arv-a.arv))/5000)*5000;}
    }
    return 275000;
  }

  const arvIsAuto=!S.quickArvOverride;
  const displayARV=arvIsAuto?autoARV(S.quickAcres):S.salePrice;
  if(arvIsAuto&&displayARV!==S.salePrice){S.salePrice=displayARV;}

  // Auto-select model based on acres (if user hasn't manually picked)
  const autoIdx=S.quickAcres<=2?1:0;
  // Use S.homeIdx directly — linked to full mode
  const qIdx=S.homeIdx;
  const qModel=DEFAULT_MODELS[qIdx];
  const qHomeCost=qIdx===DEFAULT_MODELS.length-1?S.customHome:S.modelCosts[qIdx];
  const qTrim=qModel.claytonTrim?1600:S.setup.trimUpgrade;
  const qSt=Object.values(S.setup).reduce((a,b)=>a+b,0)-S.setup.trimUpgrade+qTrim;

  // Back-calculate max lot offer (5-pass convergence)
  let lotEst=S.salePrice*0.2;
  for(let i=0;i<5;i++){
    const hardEst=lotEst+qHomeCost+qSt;
    const propTaxEst=hardEst*(S.taxRate/100)*(S.loanMonths/12);
    const htEst=propTaxEst+Object.values(S.holding).reduce((a,b)=>a+b,0);
    let tfinEst=0;
    if(S.financed){
      const loanEst=Math.min(hardEst*(S.ltcPct/100),S.salePrice*(S.ltvCapPct/100));
      tfinEst=loanEst*(S.originationPts/100)+(loanEst*(S.interestRate/100)/12)*S.loanMonths;
    }
    const tsellEst=S.salePrice*S.commPct+Math.round(S.salePrice*SELL_TITLE)+S.sellerCredit;
    lotEst=S.salePrice-qHomeCost-qSt-tfinEst-htEst-tsellEst-S.quickTargetProfit;
  }
  const maxOffer=Math.floor(lotEst/1000)*1000;
  const good=maxOffer>0,warn=maxOffer>-20000&&maxOffer<=0;
  const oc=good?"#16a34a":warn?"#b45309":"#dc2626";

  const stepper=(val,step,onDec,onInc,display)=>`
    <div style="display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface)">
      <button onclick="${onDec}" style="width:52px;height:52px;font-size:1.3rem;font-weight:300;background:transparent;border:none;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent">−</button>
      <div style="flex:1;text-align:center;font-family:var(--mono);font-size:1.1rem;font-weight:500;color:var(--text);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0.9rem 0.5rem">${display}</div>
      <button onclick="${onInc}" style="width:52px;height:52px;font-size:1.3rem;font-weight:300;background:transparent;border:none;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent">+</button>
    </div>`;

  // Quick cost items — writes directly to S.setup
  const qCostItem=(key,label,val)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0;border-bottom:1px solid var(--border)">
      <span style="font-size:0.78rem;color:var(--text-2)">${label}</span>
      <div style="position:relative;width:90px;flex-shrink:0">
        <span style="position:absolute;left:0.45rem;top:50%;transform:translateY(-50%);font-size:0.72rem;color:var(--text-3);font-family:var(--mono);pointer-events:none">$</span>
        <input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:0.32rem 0.4rem 0.32rem 1.1rem;font-family:var(--mono);font-size:0.78rem;color:var(--text);outline:none;-webkit-appearance:none;text-align:right"
          type="tel" inputmode="numeric" value="${val}"
          onblur="S.setup['${key}']=parseInt(this.value.replace(/[^0-9]/g,''))||0;saveState();render()"
          onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
    </div>`;

  return`
  <div style="max-width:480px;margin:0 auto;padding-top:0.5rem">

    <!-- Deal name -->
    <div style="margin-bottom:0.85rem">
      <input style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:0.85rem;outline:none;-webkit-appearance:none;font-weight:500"
        type="text" value="${esc(S.dealName)}" placeholder="Deal name…"
        onblur="S.dealName=this.value;saveState();render()" onkeydown="if(event.key==='Enter')this.blur()" />
    </div>

    <!-- Lot size -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Lot Size</span>
        <span style="font-family:var(--mono);font-size:1.6rem;font-weight:300;color:var(--text);line-height:1">${S.quickAcres}<span style="font-size:0.9rem;color:var(--text-3);margin-left:0.3rem">ac</span></span>
      </div>
      <input type="range" min="1" max="20" step="0.5" value="${S.quickAcres}"
        style="width:100%;accent-color:var(--accent);height:6px;border-radius:3px;cursor:pointer"
        oninput="S.quickAcres=parseFloat(this.value);S.quickArvOverride=false;saveState();render()" />
      <div style="display:flex;justify-content:space-between;margin-top:0.5rem;font-size:0.62rem;color:var(--text-3)"><span>1</span><span>5</span><span>10</span><span>15</span><span>20 ac</span></div>
    </div>

    <!-- ARV -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.9rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Sale Price / ARV</span>
        ${arvIsAuto?`<span style="font-size:0.6rem;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);border-radius:4px;padding:0.15rem 0.5rem;font-weight:600;font-family:var(--mono)">AUTO</span>`
        :`<button onclick="S.quickArvOverride=false;saveState();render()" style="font-size:0.6rem;color:var(--text-3);background:none;border:1px solid var(--border);border-radius:4px;padding:0.15rem 0.5rem;font-family:'Inter',sans-serif">Reset to auto</button>`}
      </div>
      ${stepper(S.salePrice,5000,
        `S.salePrice=Math.max(50000,S.salePrice-5000);S.quickArvOverride=true;saveState();render()`,
        `S.salePrice=S.salePrice+5000;S.quickArvOverride=true;saveState();render()`,
        fmt(S.salePrice))}
      ${arvIsAuto?`<div style="font-size:0.62rem;color:var(--text-3);margin-top:0.6rem;text-align:center">Auto-estimated for ${S.quickAcres} ac · tap +/− to override</div>`:""}
    </div>

    <!-- Target profit -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Target Profit</span>
        <span style="font-family:var(--mono);font-size:1.6rem;font-weight:300;color:${S.quickTargetProfit>=MINP?"var(--text)":"#dc2626"};line-height:1">${fmt(S.quickTargetProfit)}</span>
      </div>
      <input type="range" min="20000" max="120000" step="5000" value="${S.quickTargetProfit}"
        style="width:100%;accent-color:var(--accent);height:6px;border-radius:3px;cursor:pointer"
        oninput="S.quickTargetProfit=parseInt(this.value);saveState();render()" />
      <div style="display:flex;justify-content:space-between;margin-top:0.5rem;font-size:0.62rem;color:var(--text-3)"><span>$20K</span><span>$45K floor</span><span>$70K</span><span>$95K</span><span>$120K</span></div>
      ${S.quickTargetProfit<MINP?`<div style="font-size:0.65rem;color:#dc2626;margin-top:0.6rem;font-weight:500;text-align:center">⚠ Below $35K minimum threshold</div>`:""}
    </div>

    <!-- Home model selector -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.85rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Home Model</span>
        <span style="font-size:0.62rem;color:var(--text-3)">Synced with Full mode</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
        ${DEFAULT_MODELS.filter(m=>m.cost>0).map(m=>{
          const i=DEFAULT_MODELS.indexOf(m);
          const isActive=i===qIdx;
          return`<button onclick="S.homeIdx=${i};saveState();render()"
            style="padding:0.75rem 0.6rem;min-height:52px;border-radius:9px;border:1.5px solid ${isActive?"var(--accent)":"var(--border)"};background:${isActive?"var(--accent-light)":"var(--surface)"};text-align:left;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent">
            <div style="font-size:0.72rem;font-weight:${isActive?"600":"400"};color:${isActive?"var(--accent)":"var(--text-2)"}">${m.name}</div>
            <div style="font-size:0.6rem;color:var(--text-3);font-family:var(--mono);margin-top:0.2rem">${fmt(S.modelCosts[i])}${m.sqft?" · "+m.sqft.toLocaleString()+" sf":""}</div>
          </button>`;
        }).join("")}
      </div>
    </div>

    <!-- Additional Costs (collapsible) -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:0.85rem;overflow:hidden">
      <button onclick="S.quickCostsOpen=!S.quickCostsOpen;saveState();render()"
        style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:1rem 1.4rem;background:transparent;border:none;-webkit-tap-highlight-color:transparent">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Additional Costs</span>
        <div style="display:flex;align-items:center;gap:0.6rem">
          <span style="font-family:var(--mono);font-size:0.78rem;color:var(--text-2);font-weight:500">${fmt(S.setup.demo+S.setup.custom1+S.setup.custom2)}</span>
          <span style="font-size:0.8rem;color:var(--text-3);transition:transform 0.2s;transform:rotate(${S.quickCostsOpen?"180":"0"}deg)">▾</span>
        </div>
      </button>
      ${S.quickCostsOpen?`<div style="padding:0 1.4rem 1.2rem;border-top:1px solid var(--border)">
        <div style="font-size:0.62rem;color:var(--text-3);margin:0.8rem 0 0.5rem">Common add-on costs — updates full calculator too</div>
        ${qCostItem("demo","Demo / Teardown",S.setup.demo)}
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0;border-bottom:1px solid var(--border)">
          <input style="flex:1;background:transparent;border:1px solid transparent;border-radius:4px;padding:0.25rem 0.4rem;color:var(--text-2);font-size:0.78rem;outline:none;font-family:'Inter',sans-serif" value="${esc(S.c1lbl)}" onblur="S.c1lbl=this.value;saveState();render()" />
          <div style="position:relative;width:90px;flex-shrink:0">
            <span style="position:absolute;left:0.45rem;top:50%;transform:translateY(-50%);font-size:0.72rem;color:var(--text-3);font-family:var(--mono);pointer-events:none">$</span>
            <input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:0.32rem 0.4rem 0.32rem 1.1rem;font-family:var(--mono);font-size:0.78rem;color:var(--text);outline:none;-webkit-appearance:none;text-align:right"

          <div style="position:relative;width:90px;flex-shrink:0">
            <span style="position:absolute;left:0.45rem;top:50%;transform:translateY(-50%);font-size:0.72rem;color:var(--text-3);font-family:var(--mono);pointer-events:none">$</span>
            <input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:0.32rem 0.4rem 0.32rem 1.1rem;font-family:var(--mono);font-size:0.78rem;color:var(--text);outline:none;-webkit-appearance:none;text-align:right"
              type="tel" inputmode="numeric" value="${S.setup.custom2}"

        <div><div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.06em;color:${oc};opacity:0.65;margin-bottom:0.2rem">Home Cost</div><div style="font-family:var(--mono);font-size:0.8rem;font-weight:500;color:${oc}">${fmt(qHomeCost)}</div></div>
        <div><div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.06em;color:${oc};opacity:0.65;margin-bottom:0.2rem">Model</div><div style="font-size:0.7rem;font-weight:600;color:${oc}">${qModel.name.replace("Clayton ","").replace("TRU ","")}</div></div>

    <div style="text-align:center;margin-bottom:2.5rem">

}

/* ═══════════════════════════════════════════
   COMPARE MODE — Head-to-Head
   ═══════════════════════════════════════════ */
function buildCompareMode(){
  const models=DEFAULT_MODELS.filter(m=>m.cost>0);
  const idxA=S.compareA;const idxB=S.compareB;
  const a=recalcFor(idxA);const b=recalcFor(idxB);
  const goodA=a.net>=MINP,goodB=b.net>=MINP;
  const pcA=a.net>=MINP?"#16a34a":a.net>=0?"#b45309":"#dc2626";
  const pcB=b.net>=MINP?"#16a34a":b.net>=0?"#b45309":"#dc2626";
  const winner=a.net>b.net?"A":b.net>a.net?"B":"TIE";

  const modelSelect=(side,currentIdx)=>`
    <select onchange="S.compare${side}=parseInt(this.value);saveState();render()" style="width:100%;font-size:0.82rem;font-family:'Inter',sans-serif;padding:0.7rem 0.8rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;-webkit-appearance:none;min-height:44px">
      ${models.map(m=>{const i=DEFAULT_MODELS.indexOf(m);return`<option value="${i}"${i===currentIdx?" selected":""}>${m.name} — ${fmt(S.modelCosts[i])}</option>`;}).join("")}
    </select>`;

  const cmpRow=(label,valA,valB,hlA,hlB)=>`
    <div class="cmp-row">
      <span class="cmp-lbl" style="flex:1;text-align:right;padding-right:0.6rem;${hlA?"font-weight:600;color:var(--green)":""}">
        ${typeof valA==='string'?valA:fmt(valA)}</span>
      <span style="font-size:0.62rem;color:var(--text-3);width:5.5rem;text-align:center;flex-shrink:0">${label}</span>
      <span class="cmp-val" style="flex:1;padding-left:0.6rem;${hlB?"font-weight:600;color:var(--green)":""}">
        ${typeof valB==='string'?valB:fmt(valB)}</span>
    </div>`;

  return`
  <div style="max-width:640px;margin:0 auto">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.3rem">Head-to-Head Comparison</div>
      <div style="font-size:0.68rem;color:var(--text-3)">Same deal variables · Lot ${fmt(S.lotCost)} · ARV ${fmt(S.salePrice)} · ${S.financed?S.loanMonths+"mo financed":"Cash deal"}</div>
    </div>

    <!-- Model Selectors -->
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:0.8rem;align-items:center;margin-bottom:1.5rem">
      <div>
        <div style="font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.4rem;text-align:center">Model A</div>
        ${modelSelect("A",idxA)}
      </div>
      <div style="font-size:0.82rem;font-weight:700;color:var(--text-3);padding-top:1rem">VS</div>
      <div>
        <div style="font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.4rem;text-align:center">Model B</div>
        ${modelSelect("B",idxB)}
      </div>
    </div>

    <!-- Net Profit Hero -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem">
      <div style="background:${winner==='A'?"#f0fdf4":"var(--surface)"};border:${winner==='A'?"2px solid #16a34a":"1px solid var(--border)"};border-radius:12px;padding:1.2rem;text-align:center">
        ${winner==='A'?`<div style="font-size:0.55rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#16a34a;margin-bottom:0.4rem">✓ WINNER</div>`:`<div style="height:1.1rem"></div>`}
        <div style="font-size:0.62rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.3rem">Net Profit</div>
        <div style="font-family:var(--mono);font-size:1.6rem;font-weight:300;color:${pcA}">${fmt(a.net)}</div>
        <div style="font-size:0.62rem;color:var(--text-3);margin-top:0.3rem">${a.sqft?'$'+a.priceSqft+'/sqft':''}</div>
      </div>
      <div style="background:${winner==='B'?"#f0fdf4":"var(--surface)"};border:${winner==='B'?"2px solid #16a34a":"1px solid var(--border)"};border-radius:12px;padding:1.2rem;text-align:center">
        ${winner==='B'?`<div style="font-size:0.55rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#16a34a;margin-bottom:0.4rem">✓ WINNER</div>`:`<div style="height:1.1rem"></div>`}
        <div style="font-size:0.62rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.3rem">Net Profit</div>
        <div style="font-family:var(--mono);font-size:1.6rem;font-weight:300;color:${pcB}">${fmt(b.net)}</div>
        <div style="font-size:0.62rem;color:var(--text-3);margin-top:0.3rem">${b.sqft?'$'+b.priceSqft+'/sqft':''}</div>
      </div>
    </div>

    ${winner!=='TIE'?`<div style="text-align:center;font-size:0.72rem;color:var(--green);font-weight:600;margin-bottom:1.2rem">${a.modelName} ${winner==='A'?'wins by '+fmt(a.net-b.net):''} ${winner==='B'?b.modelName+' wins by '+fmt(b.net-a.net):''}</div>`:""}

    <!-- Detailed Comparison -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1.5rem">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;margin-bottom:0.5rem">
        <div style="font-size:0.62rem;font-weight:600;color:var(--accent);text-align:right;padding-right:0.6rem">${a.modelName}</div>
        <div style="width:5.5rem"></div>
        <div style="font-size:0.62rem;font-weight:600;color:var(--accent);padding-left:0.6rem">${b.modelName}</div>
      </div>
      ${cmpRow("Home Cost",a.hc,b.hc,a.hc<b.hc,b.hc<a.hc)}
      ${cmpRow("Sqft",a.sqft?a.sqft.toLocaleString()+" sf":"—",b.sqft?b.sqft.toLocaleString()+" sf":"—",a.sqft>b.sqft,b.sqft>a.sqft)}
      ${cmpRow("$/sqft Sale",a.sqft?"$"+a.priceSqft:"—",b.sqft?"$"+b.priceSqft:"—")}
      ${cmpRow("$/sqft Cost",a.sqft?"$"+a.costSqft:"—",b.sqft?"$"+b.costSqft:"—",a.costSqft<b.costSqft&&a.sqft>0,b.costSqft<a.costSqft&&b.sqft>0)}
      ${cmpRow("Total Hard",a.hard,b.hard,a.hard<b.hard,b.hard<a.hard)}
      ${cmpRow("Setup",a.st,b.st)}
      ${cmpRow("Financing",a.tfin,b.tfin)}
      ${cmpRow("Holding",a.ht,b.ht)}
      ${cmpRow("Selling",a.tsell,b.tsell)}
      ${cmpRow("Total All-In",a.total,b.total,a.total<b.total,b.total<a.total)}
      <div style="height:1px;background:var(--text);margin:0.5rem 0"></div>
      ${cmpRow("Net Profit",fmt(a.net),fmt(b.net),a.net>b.net,b.net>a.net)}
      ${cmpRow("Margin",fmtP(a.margin),fmtP(b.margin),a.margin>b.margin,b.margin>a.margin)}
      ${cmpRow("ROI",fmtP(a.roi),fmtP(b.roi),a.roi>b.roi,b.roi>a.roi)}
      ${cmpRow("CoC",a.coc!==null?fmtP(a.coc):"—",b.coc!==null?fmtP(b.coc):"—",a.coc>b.coc,b.coc>a.coc)}
      ${cmpRow("Cash to Close",a.cashToClose,b.cashToClose,a.cashToClose<b.cashToClose,b.cashToClose<a.cashToClose)}
      ${cmpRow("Break-Even",a.breakEven,b.breakEven,a.breakEven<b.breakEven,b.breakEven<a.breakEven)}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   BUYER MODE — Standalone Mortgage Calculator
   ═══════════════════════════════════════════ */
function buildBuyerMode(){
  const c=recalc();
  const bDown=S.salePrice*S.buyerDownPct/100;
  const bLoan=S.salePrice-bDown;
  const bR=S.buyerRate/100/12;
  const bN=S.buyerTerm*12;
  const bPmt=bR>0?bLoan*(bR*Math.pow(1+bR,bN))/(Math.pow(1+bR,bN)-1):bLoan/bN;
  const bTotal=bPmt*bN;
  const bInt=bTotal-bLoan;
  const bTaxMo=Math.round(S.salePrice*(S.taxRate/100)/12);
  const bInsMo=Math.round(S.buyerInsAnnual/12);
  const bNeedsPmi=S.buyerDownPct<20;
  const bPmiMo=bNeedsPmi?Math.round(bLoan*(S.buyerPmiRate/100)/12):0;
  const bTotalMo=Math.round(bPmt)+bTaxMo+bInsMo+bPmiMo;
  const piPct=bTotalMo>0?Math.round(bPmt/bTotalMo*100):0;
  const taxPct=bTotalMo>0?Math.round(bTaxMo/bTotalMo*100):0;
  const insPct=bTotalMo>0?Math.round(bInsMo/bTotalMo*100):0;
  const pmiPct=bTotalMo>0?Math.round(bPmiMo/bTotalMo*100):0;

  return`
  <div style="max-width:480px;margin:0 auto;padding-top:0.5rem">

    <!-- Hero: Total Monthly Payment -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.6rem 1.4rem 1.2rem;margin-bottom:1rem">
      <div style="text-align:center;margin-bottom:1.2rem">
        <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.3rem">Estimated Monthly Payment</div>
        <div style="font-size:clamp(2.4rem,10vw,3.2rem);font-weight:300;letter-spacing:-0.04em;color:var(--accent);font-family:'Inter',sans-serif;line-height:1">${fmt(bTotalMo)}</div>
        <div style="font-size:0.65rem;color:var(--text-3);margin-top:0.4rem">PITI${bNeedsPmi?" + PMI":""} · ${S.buyerTerm}-year fixed @ ${S.buyerRate}%</div>
      </div>
      <!-- Breakdown segments -->
      <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:1rem;gap:2px">
        <div style="width:${piPct}%;background:var(--accent);border-radius:3px"></div>
        <div style="width:${taxPct}%;background:var(--amber);border-radius:3px"></div>
        <div style="width:${insPct}%;background:var(--green);border-radius:3px"></div>
        ${bNeedsPmi?`<div style="width:${pmiPct}%;background:var(--red);border-radius:3px"></div>`:""}
      </div>
      <div style="display:grid;grid-template-columns:${bNeedsPmi?"1fr 1fr 1fr 1fr":"1fr 1fr 1fr"};gap:0.5rem">
        <div style="text-align:center;padding:0.5rem 0.3rem;background:var(--surface-2);border-radius:6px;border-left:3px solid var(--accent)">
          <div style="font-size:0.55rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-3)">P&I</div>
          <div style="font-family:var(--mono);font-size:0.78rem;font-weight:500;color:var(--text);margin-top:0.15rem">${fmt(Math.round(bPmt))}</div>
        </div>
        <div style="text-align:center;padding:0.5rem 0.3rem;background:var(--surface-2);border-radius:6px;border-left:3px solid var(--amber)">
          <div style="font-size:0.55rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-3)">Tax</div>
          <div style="font-family:var(--mono);font-size:0.78rem;font-weight:500;color:var(--text);margin-top:0.15rem">${fmt(bTaxMo)}</div>
        </div>
        <div style="text-align:center;padding:0.5rem 0.3rem;background:var(--surface-2);border-radius:6px;border-left:3px solid var(--green)">
          <div style="font-size:0.55rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-3)">Insurance</div>
          <div style="font-family:var(--mono);font-size:0.78rem;font-weight:500;color:var(--text);margin-top:0.15rem">${fmt(bInsMo)}</div>
        </div>
        ${bNeedsPmi?`<div style="text-align:center;padding:0.5rem 0.3rem;background:var(--surface-2);border-radius:6px;border-left:3px solid var(--red)">
          <div style="font-size:0.55rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-3)">PMI</div>
          <div style="font-family:var(--mono);font-size:0.78rem;font-weight:500;color:var(--text);margin-top:0.15rem">${fmt(bPmiMo)}</div>
        </div>`:""}
      </div>
    </div>

    <!-- Home Price -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.9rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Home Price</span>
        ${S.dealName?`<span style="font-size:0.62rem;color:var(--text-3)">${esc(S.dealName)}</span>`:""}
      </div>
      <div style="display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface)">
        <button onclick="S.salePrice=Math.max(50000,S.salePrice-5000);S.quickArvOverride=true;saveState();render()" style="width:52px;height:52px;font-size:1.3rem;font-weight:300;background:transparent;border:none;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent">−</button>
        <div style="flex:1;text-align:center;font-family:var(--mono);font-size:1.1rem;font-weight:500;color:var(--text);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0.9rem 0.5rem">${fmt(S.salePrice)}</div>
        <button onclick="S.salePrice=S.salePrice+5000;S.quickArvOverride=true;saveState();render()" style="width:52px;height:52px;font-size:1.3rem;font-weight:300;background:transparent;border:none;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent">+</button>
      </div>
      ${c.sqft?`<div style="font-size:0.62rem;color:var(--text-3);margin-top:0.5rem;text-align:center;font-family:var(--mono)">${c.modelName} · ${c.sqft.toLocaleString()} sqft · $${c.priceSqft}/sqft</div>`:""}
    </div>

    <!-- Down Payment -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.85rem">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3)">Down Payment</span>
        <span style="font-family:var(--mono);font-size:1rem;font-weight:500;color:var(--text)">${fmt(Math.round(bDown))}</span>
      </div>
      <div class="tg" style="grid-template-columns:repeat(5,1fr);margin-bottom:0.5rem">
        ${[0,3.5,5,10,20].map(p=>`<button class="tg-btn${S.buyerDownPct===p?" active":""}" style="min-height:44px;font-size:0.75rem" onclick="S.buyerDownPct=${p};saveState();render()">${p}%</button>`).join("")}
      </div>
      <div style="display:flex;justify-content:space-between;padding:0 0.1rem;margin-top:0.4rem">
        <span style="font-size:0.68rem;color:var(--text-3)">Down: ${fmt(Math.round(bDown))}</span>
        <span style="font-size:0.68rem;color:var(--text-3)">Loan: ${fmt(Math.round(bLoan))}</span>
      </div>
    </div>

    <!-- Rate, Insurance, Term -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:0.9rem">
        <div><div class="field-lbl">Interest Rate</div>
          <div style="position:relative"><input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.65rem 1.5rem 0.65rem 0.75rem;color:var(--text);font-family:var(--mono);font-size:0.88rem;outline:none;-webkit-appearance:none;" type="tel" inputmode="decimal" value="${S.buyerRate}" onblur="S.buyerRate=parseFloat(this.value)||7;saveState();render()" onkeydown="if(event.key==='Enter')this.blur()" /><span style="position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);font-size:0.75rem;color:var(--text-3);pointer-events:none">%</span></div>
        </div>
        <div><div class="field-lbl">Annual Insurance</div>
          <div style="position:relative"><span style="position:absolute;left:0.6rem;top:50%;transform:translateY(-50%);font-size:0.75rem;color:var(--text-3);pointer-events:none;font-family:var(--mono)">$</span><input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.65rem 0.75rem 0.65rem 1.5rem;color:var(--text);font-family:var(--mono);font-size:0.88rem;outline:none;-webkit-appearance:none;" type="tel" inputmode="numeric" value="${S.buyerInsAnnual}" onblur="S.buyerInsAnnual=parseInt(this.value.replace(/[^0-9]/g,''))||0;saveState();render()" onkeydown="if(event.key==='Enter')this.blur()" /></div>
        </div>
      </div>
      <div class="tg" style="grid-template-columns:1fr 1fr">
        ${[15,30].map(t=>`<button class="tg-btn${S.buyerTerm===t?" active":""}" style="min-height:44px" onclick="S.buyerTerm=${t};saveState();render()">${t}-Year Fixed</button>`).join("")}
      </div>
    </div>

    <!-- PMI -->
    ${bNeedsPmi?`
    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:1rem 1.4rem;margin-bottom:0.85rem">

          <input style="width:100%;background:#fff;border:1px solid #fde68a;border-radius:6px;padding:0.35rem 1.4rem 0.35rem 0.5rem;color:var(--text);font-family:var(--mono);font-size:0.8rem;outline:none;text-align:right" type="tel" inputmode="decimal" value="${S.buyerPmiRate}" onblur="S.buyerPmiRate=parseFloat(this.value)||0.75;saveState();render()" onkeydown="if(event.key==='Enter')this.blur()" />

    </div>`
    :`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:0.85rem 1.4rem;margin-bottom:0.85rem;font-size:0.78rem;color:#15803d;font-weight:500">✓ No PMI required — 20%+ down payment</div>`}

    <!-- Monthly Breakdown -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">

      <div class="inline-row"><span class="inline-lbl">Principal & Interest</span><span class="inline-val">${fmt(Math.round(bPmt))}</span></div>
      <div class="inline-row"><span class="inline-lbl">Property Taxes (${S.taxRate}%)</span><span class="inline-val">${fmt(bTaxMo)}</span></div>
      <div class="inline-row"><span class="inline-lbl">Homeowner's Insurance</span><span class="inline-val">${fmt(bInsMo)}</span></div>
      ${bNeedsPmi?`<div class="inline-row"><span class="inline-lbl">Mortgage Insurance (PMI)</span><span class="inline-val" style="color:#b45309">${fmt(bPmiMo)}</span></div>`:""}
      <div style="display:flex;justify-content:space-between;padding-top:0.6rem;margin-top:0.3rem;border-top:2px solid var(--text)">
        <span style="font-size:0.88rem;font-weight:700;color:var(--text)">Total Monthly</span>
        <span style="font-family:var(--mono);font-size:0.88rem;font-weight:700;color:var(--accent)">${fmt(bTotalMo)}</span>
      </div>
    </div>

    <!-- Loan Summary -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.7rem">Loan Summary</div>
      <div class="inline-row"><span class="inline-lbl">Home Price</span><span class="inline-val" style="font-weight:600;color:var(--text)">${fmt(S.salePrice)}</span></div>
      <div class="inline-row"><span class="inline-lbl">Down Payment (${S.buyerDownPct}%)</span><span class="inline-val" style="font-weight:600;color:var(--text)">${fmt(Math.round(bDown))}</span></div>
      <div class="inline-row"><span class="inline-lbl">Loan Amount</span><span class="inline-val">${fmt(Math.round(bLoan))}</span></div>
      <div class="inline-row"><span class="inline-lbl">Interest Rate</span><span class="inline-val">${S.buyerRate}% fixed</span></div>
      <div class="inline-row"><span class="inline-lbl">Loan Term</span><span class="inline-val">${S.buyerTerm} years (${bN} payments)</span></div>
      <div style="height:1px;background:var(--border);margin:0.5rem 0"></div>
      <div class="inline-row"><span class="inline-lbl">Total Interest Paid</span><span class="inline-val" style="color:#b45309">${fmt(Math.round(bInt))}</span></div>
      <div class="inline-row"><span class="inline-lbl">Total of All Payments</span><span class="inline-val">${fmt(Math.round(bTotal))}</span></div>
      ${bNeedsPmi?`<div class="inline-row"><span class="inline-lbl">Est. PMI (annual)</span><span class="inline-val" style="color:var(--text-3)">${fmt(bPmiMo*12)}/yr</span></div>`:""}
      <div style="font-size:0.6rem;color:var(--text-3);margin-top:0.5rem">${bNeedsPmi?"PMI typically drops off once you reach 20% equity":""}
      </div>
    </div>

    <!-- Compare terms -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.7rem">15yr vs 30yr Comparison</div>
      ${[15,30].map(t=>{
        const n2=t*12;const r2=S.buyerRate/100/12;
        const pmt2=r2>0?bLoan*(r2*Math.pow(1+r2,n2))/(Math.pow(1+r2,n2)-1):bLoan/n2;
        const tot2=pmt2*n2;const int2=tot2-bLoan;
        const taxIns=bTaxMo+bInsMo+bPmiMo;
        const isActive=t===S.buyerTerm;
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0.8rem;margin-bottom:0.4rem;border-radius:8px;border:1.5px solid ${isActive?"var(--accent)":"var(--border)"};background:${isActive?"var(--accent-light)":"transparent"}">

            <div style="font-size:0.78rem;font-weight:${isActive?"600":"400"};color:${isActive?"var(--accent)":"var(--text-2)"}">${t}-Year Fixed</div>
            <div style="font-size:0.62rem;color:var(--text-3);margin-top:0.15rem">${fmt(Math.round(int2))} total interest</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:var(--mono);font-size:1rem;font-weight:600;color:${isActive?"var(--accent)":"var(--text)"}">${fmt(Math.round(pmt2+taxIns))}<span style="font-size:0.65rem;color:var(--text-3);font-weight:400">/mo</span></div>
            <div style="font-size:0.6rem;color:var(--text-3);font-family:var(--mono)">${fmt(Math.round(pmt2))} P&I</div>
          </div>
        </div>`;
      }).join("")}
      ${(()=>{
        const r15=S.buyerRate/100/12;const n15=180;const r30=S.buyerRate/100/12;const n30=360;
        const p15=r15>0?bLoan*(r15*Math.pow(1+r15,n15))/(Math.pow(1+r15,n15)-1):bLoan/n15;
        const p30=r30>0?bLoan*(r30*Math.pow(1+r30,n30))/(Math.pow(1+r30,n30)-1):bLoan/n30;
        const saved=(p30*n30)-(p15*n15);
        return saved>0?`<div style="font-size:0.68rem;color:var(--green);margin-top:0.4rem;text-align:center;font-weight:500">15yr saves ${fmt(Math.round(saved))} in total interest vs 30yr</div>`:"";
      })()}
    </div>

    <div style="text-align:center;font-size:0.6rem;color:var(--text-3);margin-bottom:2.5rem;padding:0 1rem">Estimates only — actual payment may vary. Does not include HOA. Tax rate based on ${S.taxRate}% of home price. PMI rates vary by lender and credit score.</div>

/* ═══════════════════════════════════════════
   SUBDIVIDE MODE — Land Subdivision Calculator
   ═══════════════════════════════════════════ */
function buildSubdivideMode(){
  const d=S.sub;
  const numLots=Math.max(1,Math.floor(d.totalFrontage/d.ftPerLot));
  const numMeters=d.numMetersOverride>0?d.numMetersOverride:numLots;
  const waterCost=numMeters*d.waterMeterCost;
  const electricTotal=d.electricPerLot*numLots;
  const totalInfra=waterCost+d.miscWaterCost+electricTotal+d.surveyCost+d.roadCost+d.attorneyFees+d.filingFees+d.custom1+d.custom2;
  const autoBuyClosing=Math.round(d.landPrice*0.005);
  const buyClosing=d.buyClosingOverride>0?d.buyClosingOverride:autoBuyClosing;
  const buyClosingIsAuto=d.buyClosingOverride===0;
  const hardCost=d.landPrice+totalInfra+buyClosing;

  let loanAmt=0,origFee=0,interest=0,totalFin=0;
  if(d.financed){
    loanAmt=Math.round(hardCost*(d.ltcPct/100));
    origFee=Math.round(loanAmt*(d.originationPts/100));
    interest=Math.round((loanAmt*(d.interestRate/100)/12)*d.loanMonths);
    totalFin=origFee+interest;
  }

  const holdPropTax=Math.round(hardCost*(d.holdTaxRate/100)*(d.loanMonths/12));
  const totalHold=holdPropTax+d.holdInsurance+d.holdMaint;

  // Rollback taxes (ag exemption removal)
  let rollbackBase=0,rollbackInt=0,rollbackTotal=0;
  if(d.agExemption&&d.marketValue>d.agValue){
    const annualDiff=(d.marketValue-d.agValue)*(d.holdTaxRate/100);
    rollbackBase=Math.round(annualDiff*d.rollbackYears);
    const sumYears=d.rollbackYears*(d.rollbackYears+1)/2;
    rollbackInt=Math.round(annualDiff*(d.rollbackInterest/100)*sumYears);
    rollbackTotal=rollbackBase+rollbackInt;
  }

  const totalBasis=hardCost+totalFin+totalHold+rollbackTotal;
  const basisPerLot=Math.round(totalBasis/numLots);

  const t_rev=numLots*d.lotArvTrad;
  const t_comm=Math.round(t_rev*d.commPct);
  const t_title=Math.round(t_rev*0.01);
  const t_sell=t_comm+t_title;
  const t_net=t_rev-totalBasis-t_sell;
  const t_netLot=Math.round(t_net/numLots);
  const t_roi=totalBasis>0?t_net/totalBasis:0;

  const sf_downLot=Math.round(d.lotArvSF*(d.sfDownPct/100));
  const sf_loanLot=d.lotArvSF-sf_downLot;
  const sf_r=d.sfRate/100/12;
  const sf_n=d.sfTermYrs*12;
  const sf_pmtLot=sf_r>0?sf_loanLot*(sf_r*Math.pow(1+sf_r,sf_n))/(Math.pow(1+sf_r,sf_n)-1):sf_loanLot/sf_n;
  const sf_totalPerLot=sf_downLot+sf_pmtLot*sf_n;
  const sf_totalRev=sf_totalPerLot*numLots;
  const sf_totalDowns=sf_downLot*numLots;
  const sf_monthlyAll=Math.round(sf_pmtLot*numLots);
  const sf_title=Math.round(numLots*d.lotArvSF*0.005);
  const sf_net=sf_totalRev-totalBasis-sf_title;
  const sf_netLot=Math.round(sf_net/numLots);
  const sf_interestEarned=Math.round((sf_totalPerLot-d.lotArvSF)*numLots);

  const mh_homeTotal=numLots*d.mhHomeCost;
  const mh_setupTotal=numLots*d.mhSetupCost;
  const mh_totalCost=totalBasis+mh_homeTotal+mh_setupTotal;
  const mh_rev=numLots*d.lotArvMH;
  const mh_comm=Math.round(mh_rev*d.commPct);
  const mh_title=Math.round(mh_rev*0.01);
  const mh_sell=mh_comm+mh_title;
  const mh_net=mh_rev-mh_totalCost-mh_sell;
  const mh_netLot=Math.round(mh_net/numLots);
  const mh_roi=mh_totalCost>0?mh_net/mh_totalCost:0;

  // ── FINANCIAL METRICS ──
  const cashReq=d.financed?hardCost-loanAmt+origFee+buyClosing:hardCost;
  const mh_cashReq=cashReq+mh_homeTotal+mh_setupTotal;
  // Traditional
  const t_margin=t_rev>0?t_net/t_rev:0;
  const t_coc=cashReq>0?t_net/cashReq:0;
  const t_breakEven=numLots>0?Math.ceil((totalBasis)/(numLots*(1-d.commPct-0.01))):0;
  // Seller Finance
  const sf_margin=sf_totalRev>0?sf_net/sf_totalRev:0;
  const sf_coc=cashReq>0?sf_net/cashReq:0;
  const sf_annReturn=cashReq>0&&d.sfTermYrs>0?sf_net/(cashReq*d.sfTermYrs):0;
  const sf_yield=cashReq>0?sf_monthlyAll*12/cashReq:0;
  // MH
  const mh_margin=mh_rev>0?mh_net/mh_rev:0;
  const mh_coc=mh_cashReq>0?mh_net/mh_cashReq:0;

  const exits=[{name:"Traditional",net:t_net},{name:"Seller Finance",net:Math.round(sf_net)},{name:"Mobile Home",net:mh_net}];
  const best=exits.reduce((a,b)=>a.net>b.net?a:b);

  const sInp=(label,key,prefix,suffix)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0;border-bottom:1px solid var(--border)">
      <span style="font-size:0.78rem;color:var(--text-2)">${label}</span>
      <div style="position:relative;width:100px;flex-shrink:0">
        ${prefix?`<span style="position:absolute;left:0.45rem;top:50%;transform:translateY(-50%);font-size:0.72rem;color:var(--text-3);font-family:var(--mono);pointer-events:none">${prefix}</span>`:""}
        <input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:0.38rem ${suffix?"1.4rem":"0.4rem"} 0.38rem ${prefix?"1.2rem":"0.5rem"};font-family:var(--mono);font-size:0.8rem;color:var(--text);outline:none;-webkit-appearance:none;text-align:right"
          type="tel" inputmode="${suffix?"decimal":"numeric"}" value="${eval('S.sub.'+key)}"
          onblur="S.sub.${key}=${suffix?"parseFloat":"parseInt"}(this.value${suffix?"":".replace(/[^0-9]/g,'')"})||0;saveState();render()"
          onkeydown="if(event.key==='Enter')this.blur()" />
        ${suffix?`<span style="position:absolute;right:0.4rem;top:50%;transform:translateY(-50%);font-size:0.68rem;color:var(--text-3);pointer-events:none">${suffix}</span>`:""}
      </div>
    </div>`;

  const sInpCustom=(lblKey,valKey)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0;border-bottom:1px solid var(--border)">
      <input style="flex:1;background:transparent;border:1px solid transparent;border-radius:4px;padding:0.25rem 0.4rem;color:var(--text-2);font-size:0.78rem;outline:none;font-family:'Inter',sans-serif" value="${esc(eval('S.sub.'+lblKey))}" onblur="S.sub.${lblKey}=this.value;saveState();render()" />
      <div style="position:relative;width:100px;flex-shrink:0">
        <span style="position:absolute;left:0.45rem;top:50%;transform:translateY(-50%);font-size:0.72rem;color:var(--text-3);font-family:var(--mono);pointer-events:none">$</span>
        <input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:0.38rem 0.4rem 0.38rem 1.2rem;font-family:var(--mono);font-size:0.8rem;color:var(--text);outline:none;-webkit-appearance:none;text-align:right"
          type="tel" inputmode="numeric" value="${eval('S.sub.'+valKey)}"
          onblur="S.sub.${valKey}=parseInt(this.value.replace(/[^0-9]/g,''))||0;saveState();render()"
          onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
    </div>`;

  const exitColor=(net)=>net>=MINP*numLots?"#16a34a":net>=0?"#b45309":"#dc2626";
  const subLine=(lbl,val)=>`<div style="display:flex;justify-content:space-between;padding:0.2rem 0 0.35rem;border-bottom:1px solid var(--border)"><span style="font-size:0.68rem;color:var(--text-3);padding-left:0.5rem">${lbl}</span><span style="font-family:var(--mono);font-size:0.68rem;color:var(--text-3)">${fmt(val)}</span></div>`;

  return`
  <div style="max-width:640px;margin:0 auto;padding-top:0.5rem">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:0.85rem;font-weight:600;color:var(--text)">Land Subdivision Calculator</div>
      <div style="font-size:0.68rem;color:var(--text-3);margin-top:0.3rem">Buy land · subdivide into lots · compare exit strategies</div>
    </div>

    <!-- DEAL INFO -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.8rem">Deal Info</div>
      <div style="margin-bottom:0.6rem">
        <div style="font-size:0.7rem;font-weight:500;color:var(--text-2);margin-bottom:0.3rem">Deal Name</div>
        <input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.75rem;color:var(--text);font-family:var(--mono);font-size:0.85rem;outline:none;-webkit-appearance:none"
          type="text" value="${esc(S.dealName)}" placeholder="e.g. Johnson Rd 30 acres"
          onblur="S.dealName=this.value;saveState();render()" onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
      <div style="margin-bottom:0.6rem">
        <div style="font-size:0.7rem;font-weight:500;color:var(--text-2);margin-bottom:0.3rem">Property Address</div>
        <input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.75rem;color:var(--text);font-family:var(--mono);font-size:0.85rem;outline:none;-webkit-appearance:none"
          type="text" value="${esc(S.dealAddress)}" placeholder="e.g. FM 917, Alvarado TX"
          onblur="S.dealAddress=this.value;saveState();render()" onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
      <div>
        <div style="font-size:0.7rem;font-weight:500;color:var(--text-2);margin-bottom:0.3rem">Notes</div>
        <textarea style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.75rem;color:var(--text);font-family:'Inter',sans-serif;font-size:0.82rem;outline:none;resize:vertical;min-height:50px;-webkit-appearance:none;line-height:1.5"
          placeholder="Zoning, restrictions, water district…"
          onblur="S.notes=this.value;saveState();render()">${esc(S.notes)}</textarea>
      </div>
    </div>

    <!-- LAND ACQUISITION -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.8rem">Land Acquisition</div>
      ${sInp("Land Purchase Price","landPrice","$")}
      ${sInp("Total Road Frontage","totalFrontage","","ft")}
      ${sInp("Frontage per Lot","ftPerLot","","ft")}
      <div style="display:flex;justify-content:space-between;padding:0.65rem 0 0.2rem;margin-top:0.3rem;border-top:1px solid var(--border-strong)">
        <span style="font-size:0.82rem;font-weight:600;color:var(--text)">Number of Lots</span>
        <span style="font-family:var(--mono);font-size:1.1rem;font-weight:600;color:var(--accent)">${numLots}</span>
      </div>
      <div style="font-size:0.62rem;color:var(--text-3)">${d.totalFrontage} ft ÷ ${d.ftPerLot} ft = ${numLots} lots · ${fmt(Math.round(d.landPrice/numLots))}/lot land cost</div>
    </div>

    <!-- INFRASTRUCTURE -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0.85rem">
      <div style="font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:0.8rem">Infrastructure & Development</div>

      <div style="font-size:0.6rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-3);margin:0.6rem 0 0.3rem">Water</div>
      ${sInp("Water Meter (each)","waterMeterCost","$")}
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0;border-bottom:1px solid var(--border)">
        <span style="font-size:0.78rem;color:var(--text-2)">Number of Meters</span>
        <div style="display:flex;align-items:center;gap:0.5rem">
          ${d.numMetersOverride===0?`<span style="font-size:0.55rem;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);border-radius:3px;padding:0.08rem 0.35rem;font-family:var(--mono);font-weight:600">AUTO</span>`:""}
          <div style="position:relative;width:60px;flex-shrink:0">
            <input style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:0.38rem 0.4rem;font-family:var(--mono);font-size:0.8rem;color:var(--text);outline:none;-webkit-appearance:none;text-align:right"
              type="tel" inputmode="numeric" value="${numMeters}" placeholder="${numLots}"
              onblur="S.sub.numMetersOverride=parseInt(this.value.replace(/[^0-9]/g,''))||0;saveState();render()"
              onkeydown="if(event.key==='Enter')this.blur()" />
          </div>
        </div>
      </div>
      ${subLine("Total Meters",waterCost)}
      ${sInp("Misc Water Costs","miscWaterCost","$")}
      ${subLine("Total Water",waterCost+d.miscWaterCost)}

      <div style="font-size:0.6rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-3);margin:0.8rem 0 0.3rem">Electrical</div>
      ${sInp("Electrical (per lot)","electricPerLot","$")}
      ${subLine("Total electrical ("+numLots+" lots)",electricTotal)}

      <div style="font-size:0.6rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-3);margin:0.8rem 0 0.3rem">Other</div>
      ${sInp("Survey / Plat","surveyCost","$")}
      ${sInp("Road / Access","roadCost","$")}
      ${sInp("Attorney Fees","attorneyFees","$")}
      ${sInp("Filing Fees","filingFees","$")}
      ${sInpCustom("c1lbl","custom1")}
      ${sInpCustom("c2lbl","custom2")}

function printSubPDF(){
  const d=S.sub;
  const numLots=Math.max(1,Math.floor(d.totalFrontage/d.ftPerLot));
  const numMeters=d.numMetersOverride>0?d.numMetersOverride:numLots;
  const waterCost=numMeters*d.waterMeterCost;
  const electricTotal=d.electricPerLot*numLots;
  const totalInfra=waterCost+d.miscWaterCost+electricTotal+d.surveyCost+d.roadCost+d.attorneyFees+d.filingFees+d.custom1+d.custom2;
  const buyClosing=d.buyClosingOverride>0?d.buyClosingOverride:Math.round(d.landPrice*0.005);
  const hardCost=d.landPrice+totalInfra+buyClosing;
  let loanAmt=0,origFee=0,interest=0,totalFin=0;
  if(d.financed){loanAmt=Math.round(hardCost*(d.ltcPct/100));origFee=Math.round(loanAmt*(d.originationPts/100));interest=Math.round((loanAmt*(d.interestRate/100)/12)*d.loanMonths);totalFin=origFee+interest;}
  const holdPropTax=Math.round(hardCost*(d.holdTaxRate/100)*(d.loanMonths/12));
  const totalHold=holdPropTax+d.holdInsurance+d.holdMaint;
  let rollbackTotal=0;
  if(d.agExemption&&d.marketValue>d.agValue){const ad=(d.marketValue-d.agValue)*(d.holdTaxRate/100);rollbackTotal=Math.round(ad*d.rollbackYears)+Math.round(ad*(d.rollbackInterest/100)*(d.rollbackYears*(d.rollbackYears+1)/2));}
  const totalBasis=hardCost+totalFin+totalHold+rollbackTotal;
  const basisPerLot=Math.round(totalBasis/numLots);
  const t_rev=numLots*d.lotArvTrad,t_comm=Math.round(t_rev*d.commPct),t_title=Math.round(t_rev*0.01),t_sell=t_comm+t_title,t_net=t_rev-totalBasis-t_sell;
  const sf_downLot=Math.round(d.lotArvSF*(d.sfDownPct/100)),sf_loanLot=d.lotArvSF-sf_downLot,sf_r=d.sfRate/100/12,sf_n=d.sfTermYrs*12;
  const sf_pmtLot=sf_r>0?sf_loanLot*(sf_r*Math.pow(1+sf_r,sf_n))/(Math.pow(1+sf_r,sf_n)-1):sf_loanLot/sf_n;
  const sf_totalRev=(sf_downLot+sf_pmtLot*sf_n)*numLots,sf_title=Math.round(numLots*d.lotArvSF*0.005),sf_net=sf_totalRev-totalBasis-sf_title;
  const sf_monthlyAll=Math.round(sf_pmtLot*numLots);
  const mh_homeTotal=numLots*d.mhHomeCost,mh_setupTotal=numLots*d.mhSetupCost,mh_totalCost=totalBasis+mh_homeTotal+mh_setupTotal;
  const mh_rev=numLots*d.lotArvMH,mh_comm=Math.round(mh_rev*d.commPct),mh_title=Math.round(mh_rev*0.01),mh_sell=mh_comm+mh_title,mh_net=mh_rev-mh_totalCost-mh_sell;

  const exitColor=(net)=>net>=0?"#16a34a":"#dc2626";

  const win=window.open("","_blank");

  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#111;background:#fff;padding:48px;font-size:13px;line-height:1.5}@media print{body{padding:32px}@page{margin:0.6in;size:letter}}h1{font-size:22px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;color:#111}h2{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#999;margin:24px 0 8px;border-bottom:2px solid #111;padding-bottom:4px}table{width:100%;border-collapse:collapse}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:8px}.meta{display:flex;gap:24px;margin:16px 0 24px;padding:16px;background:#f8f8f8;border-radius:6px}.meta-item{text-align:center;flex:1}.meta-lbl{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999}.meta-val{font-size:20px;font-weight:300;font-family:'Courier New',monospace;margin-top:4px}.footer{margin-top:40px;padding-top:16px;border-top:1px solid #ddd;font-size:10px;color:#aaa;display:flex;justify-content:space-between}</style></head><body>

  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #111">
    <div><h1>Range Land Group</h1><div style="font-size:11px;color:#999;margin-top:4px;letter-spacing:0.08em;text-transform:uppercase">Land Subdivision Analysis</div>

  </div>

  <div class="meta">

    <div class="meta-item" style="border-left:1px solid #ddd"><div class="meta-lbl">Total Basis</div><div class="meta-val">${fmt(totalBasis)}</div></div>

    ${d.miscWaterCost?row("Misc Water",fmt(d.miscWaterCost),true):""}
